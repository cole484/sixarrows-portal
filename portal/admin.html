<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Six Arrows — Admin</title>
<link rel="stylesheet" href="style.css"/>
<script src="data.js"></script>
<script src="app.js"></script>
<style>
/* ── Admin shell ── */
.admin-shell { display:flex; min-height:100vh; }
.admin-sidebar {
  width:220px; flex-shrink:0; background:var(--charcoal);
  padding:1.25rem 1rem; display:flex; flex-direction:column; gap:1.25rem;
  position:sticky; top:0; height:100vh; overflow-y:auto;
}
.admin-logo { display:flex; align-items:center; gap:9px; }
.admin-logo img { width:28px; height:28px; object-fit:contain; }
.admin-logo-text { font-size:11px; font-weight:700; color:var(--cream); letter-spacing:.05em; text-transform:uppercase; }
.admin-logo-sub  { font-size:9px; color:rgba(235,233,222,.3); letter-spacing:.1em; text-transform:uppercase; }
.admin-nav-section { margin-bottom:4px; }
.admin-nav-title { font-size:9px; text-transform:uppercase; letter-spacing:.13em; color:rgba(235,233,222,.25); margin-bottom:5px; padding-left:9px; }
.admin-nav-link {
  display:flex; align-items:center; gap:7px;
  padding:7px 9px; border-radius:var(--r-md);
  color:rgba(235,233,222,.42); font-size:12px; font-weight:400;
  cursor:pointer; transition:all .15s; margin-bottom:1px; user-select:none;
}
.admin-nav-link:hover { background:rgba(255,255,255,.06); color:rgba(235,233,222,.72); }
.admin-nav-link.active { background:rgba(117,127,105,.2); color:var(--cream); font-weight:500; }
.admin-nav-link svg { width:13px; height:13px; opacity:.6; flex-shrink:0; }
.admin-nav-link.active svg { opacity:1; }

.admin-main { flex:1; min-width:0; background:var(--cream); }
.admin-topbar {
  position:sticky; top:0; z-index:10;
  height:50px; background:var(--cream-pale);
  border-bottom:0.5px solid var(--border-2);
  padding:0 1.5rem; display:flex; align-items:center; justify-content:space-between;
}
.admin-topbar-title { font-size:13px; font-weight:600; color:var(--charcoal); }
.admin-content { padding:1.5rem; max-width:900px; }

/* Project tabs */
.project-tabs { display:flex; gap:6px; margin-bottom:1.25rem; flex-wrap:wrap; }
.project-tab {
  padding:7px 15px; border-radius:var(--r-full);
  border:0.5px solid var(--border-2); background:white;
  cursor:pointer; font-size:12px; font-weight:500; color:var(--charcoal-3); transition:all .15s;
}
.project-tab.active { background:var(--charcoal); color:var(--cream); border-color:var(--charcoal); }
.project-tab:hover:not(.active) { border-color:var(--border-3); color:var(--charcoal); }

/* Form elements */
.adm-field { margin-bottom:12px; }
.adm-field label { display:block; font-size:11px; font-weight:600; color:var(--charcoal-3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:5px; }
.adm-inp {
  width:100%; padding:9px 12px; font-size:13px; font-family:'Work Sans',sans-serif;
  border:0.5px solid var(--border-2); border-radius:var(--r-md); background:white;
  color:var(--charcoal); outline:none; transition:border-color .15s;
}
.adm-inp:focus { border-color:var(--green); }
.adm-inp[type=date] { cursor:pointer; }
.adm-sel { appearance:none; cursor:pointer; background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23999' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 10px center; padding-right:28px; }
.adm-textarea { resize:vertical; min-height:80px; }
.adm-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.adm-grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
.adm-btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 16px; border-radius:var(--r-md); border:none;
  font-size:12px; font-weight:600; cursor:pointer; font-family:'Work Sans',sans-serif;
  transition:all .15s;
}
.adm-btn-primary { background:var(--charcoal); color:var(--cream); }
.adm-btn-primary:hover { opacity:.85; }
.adm-btn-green { background:var(--green); color:white; }
.adm-btn-green:hover { opacity:.85; }
.adm-btn-danger { background:var(--danger-lt); color:var(--danger); border:0.5px solid rgba(184,50,50,.2); }
.adm-btn-danger:hover { background:#fde8e8; }
.adm-btn-ghost { background:var(--cream-pale); color:var(--charcoal-3); border:0.5px solid var(--border-2); }
.adm-btn-ghost:hover { background:var(--cream-2); }

/* Step management */
.step-manage-row {
  display:flex; align-items:center; gap:10px;
  padding:10px 0; border-bottom:0.5px solid var(--border);
}
.step-manage-row:last-child { border-bottom:none; }
.step-check {
  width:20px; height:20px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  border:1.5px solid var(--border-3); cursor:pointer; transition:all .15s;
}
.step-check.done { background:var(--green); border-color:var(--green); }
.step-check svg { width:9px; height:9px; }
.step-manage-meta { flex:1; min-width:0; }
.step-manage-name { font-size:13px; font-weight:500; color:var(--charcoal); }
.step-manage-date { font-size:11px; color:var(--charcoal-4); margin-top:1px; }
.step-manage-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.step-date-set { font-size:11px; padding:4px 8px; border:0.5px solid var(--border-2); border-radius:var(--r-xs); font-family:'Work Sans',sans-serif; background:white; color:var(--charcoal); outline:none; cursor:pointer; }
.step-date-set:focus { border-color:var(--green); }

/* Update / milestone rows */
.list-item-row {
  display:flex; align-items:flex-start; gap:10px;
  padding:12px 0; border-bottom:0.5px solid var(--border);
}
.list-item-row:last-child { border-bottom:none; }
.list-item-body { flex:1; min-width:0; }
.list-item-meta { font-size:11px; color:var(--charcoal-4); margin-bottom:2px; }
.list-item-title { font-size:13px; font-weight:600; color:var(--charcoal); margin-bottom:2px; }
.list-item-note { font-size:12px; color:var(--charcoal-3); line-height:1.4; }

/* Phase section header */
.phase-section-hd {
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:.1em; color:var(--charcoal-4);
  padding:10px 0 8px; border-bottom:0.5px solid var(--border-2);
  margin-bottom:4px; margin-top:16px;
}
.phase-section-hd:first-child { margin-top:0; }

/* Adm msg */
.adm-msg { font-size:12px; padding:8px 12px; border-radius:var(--r-md); margin-top:8px; display:none; }
.adm-msg.success { background:var(--green-lt); color:var(--green-deep); }
.adm-msg.error   { background:var(--danger-lt); color:var(--danger); }
</style>
</head>
<body>
<script>
// ════════════════════════════════════════════════════════
//  SIX ARROWS ADMIN PANEL
// ════════════════════════════════════════════════════════

const ADMIN_PASS = 'sa_admin_2026';
// Supabase direct access for admin operations
const SUPABASE_DIRECT_URL = 'https://mtvcahscwpralmlqlnzg.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10dmNhaHNjd3ByYWxtbHFsbnpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MTY4ODEsImV4cCI6MjA5MDM5Mjg4MX0.givpTh-YxG16vYZmn0KLBCPG0ivxYbjh-i8Q87eCNnk';
let adminAuthed  = false;
let activeProject = sessionStorage.getItem('sa_admin_project') || Object.keys(PROJECTS)[0];
let activeView    = sessionStorage.getItem('sa_admin_view')    || 'tracker';

// ── Storage helpers ──────────────────────────────────────
function adminKey(projectId, suffix) { return `sa_admin_${projectId}_${suffix}`; }
function adminGet(projectId, suffix) {
  try { return JSON.parse(localStorage.getItem(adminKey(projectId, suffix)) || 'null'); } catch(e) { return null; }
}
function adminSet(projectId, suffix, val) {
  localStorage.setItem(adminKey(projectId, suffix), JSON.stringify(val));
}

// Tracker state uses the same key as the client portal
function getTrackerState(p) {
  try { return JSON.parse(localStorage.getItem('sa_tracker_v3_' + p.id) || '{}'); } catch(e) { return {}; }
}
function setTrackerState(p, TS) {
  localStorage.setItem('sa_tracker_v3_' + p.id, JSON.stringify(TS));
}

// ── Auth ─────────────────────────────────────────────────
async function checkAdminAuth() {
  if (sessionStorage.getItem('sa_admin_auth') === ADMIN_PASS) {
    adminAuthed = true;
    await loadAllClientsFromSupabase();
    // Validate stored project still exists, else fall back to first
    if (!PROJECTS[activeProject]) {
      activeProject = Object.keys(PROJECTS)[0];
      sessionStorage.setItem('sa_admin_project', activeProject);
    }
    renderAdmin();
    return;
  }
  renderAdminLogin();
}

// Load all client data from Supabase into PROJECTS
async function loadAllClientsFromSupabase() {
  try {
    const sbHeaders = {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${SUPABASE_ANON}`,
      'Content-Type': 'application/json',
    };

    // Fetch all clients
    const clientsRes = await fetch(`${SUPABASE_DIRECT_URL}/rest/v1/clients?select=*&order=client_name.asc`, { headers: sbHeaders });
    if (!clientsRes.ok) { console.warn('Could not load clients from Supabase'); return; }
    const clients = await clientsRes.json();

    // Fetch all budget categories in one call
    const budgetRes = await fetch(`${SUPABASE_DIRECT_URL}/rest/v1/budget_categories?select=*&order=sort_order.asc`, { headers: sbHeaders });
    const allBudget = budgetRes.ok ? await budgetRes.json() : [];

    // Fetch all updates
    const updatesRes = await fetch(`${SUPABASE_DIRECT_URL}/rest/v1/updates?select=*&approved=eq.true&order=created_at.desc`, { headers: sbHeaders });
    const allUpdates = updatesRes.ok ? await updatesRes.json() : [];

    // Fetch all milestones
    const milestonesRes = await fetch(`${SUPABASE_DIRECT_URL}/rest/v1/milestones?select=*&order=sort_order.asc`, { headers: sbHeaders });
    const allMilestones = milestonesRes.ok ? await milestonesRes.json() : [];

    // Fetch all documents
    const docsRes = await fetch(`${SUPABASE_DIRECT_URL}/rest/v1/documents?select=*&order=created_at.asc`, { headers: sbHeaders });
    const allDocs = docsRes.ok ? await docsRes.json() : [];

    // Merge into PROJECTS
    for (const client of clients) {
      const id = client.id;
      const existing = PROJECTS[id] || {};

      const budgetCats = allBudget
        .filter(b => b.client_id === id)
        .map(cat => ({
          name:          cat.name,
          total:         cat.total || 0,
          spent:         cat.spent || 0,
          status:        cat.status || 'pending',
          subCategories: (cat.sub_categories || []).map(sub => ({
            name: sub.name, total: sub.total || 0, spent: sub.spent || 0,
          })),
        }));

      const updates = allUpdates
        .filter(u => u.client_id === id)
        .map(u => ({ id: u.id, date: u.date, title: u.title, body: u.body }));

      const timeline = allMilestones
        .filter(m => m.client_id === id)
        .map(m => ({ date: m.date, title: m.title, note: m.note, done: m.done }));

      PROJECTS[id] = {
        ...existing,
        id,
        email:               client.email,
        password:            client.password,
        clientName:          client.client_name,
        projectName:         client.project_name,
        location:            client.location,
        statusType:          client.status_type,
        phaseLabel:          client.phase_label,
        constructionPct:     client.construction_pct || 0,
        groundbreakingDate:  client.groundbreaking_date || '',
        budgetTotal:         client.budget_total || 0,
        budgetCommitted:     client.budget_committed || 0,
        budgetAllowance:     client.budget_allowance || 0,
        budgetContingency:   client.budget_contingency || 0,
        timelineStart:       client.timeline_start || 'TBD',
        timelineTarget:      client.timeline_target || 'TBD',
        quickSummary:        client.quick_summary || '',
        notionTrackerPageId: client.notion_tracker_page_id || null,
        selectionsClientKey: client.selections_client_key || id,
        links:               { budget: client.budget_link || (existing.links?.budget || '#'), timeline: '#' },
        reviewDraft:         client.review_draft || '',
        reviewLeft:          !!client.review_left,
        showReviewCard:      !!client.show_review_card,
        projectType:         client.project_type || 'new_build',
        budgetCategories:    budgetCats,
        updates:             updates.length ? updates : (existing.updates || []),
        timeline:            timeline.length ? timeline : (existing.timeline || []),
        sabPhases:           existing.sabPhases || JSON.parse(JSON.stringify(DEFAULT_SAB_PHASES)),
        badges:              existing.badges    || JSON.parse(JSON.stringify(DEFAULT_BADGES)),
        decisions:           existing.decisions || [],
        documents:           allDocs.filter(d => d.client_id === id).map(d => ({
          id: d.id, name: d.name, category: d.category, url: d.url,
          type: d.type, date: d.date, note: d.note || '',
        })),
        changeOrderItems:    existing.changeOrderItems || [],
      };
    }
    console.log(`Admin: loaded ${clients.length} clients from Supabase`);
  } catch(e) {
    console.warn('Supabase load failed, using local data:', e.message);
  }
}

function renderAdminLogin() {
  document.body.innerHTML = `
    <div class="login-page">
      <div style="background:white;border:0.5px solid var(--border-2);border-radius:var(--r-2xl);padding:2.5rem;max-width:400px;width:90%;box-shadow:var(--sh-lg)">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.5rem">
          <img id="al-logo" style="width:32px;height:32px;object-fit:contain">
          <div>
            <div style="font-size:12px;font-weight:700;color:var(--charcoal);text-transform:uppercase;letter-spacing:.05em">Six Arrows</div>
            <div style="font-size:9px;color:var(--charcoal-4);text-transform:uppercase;letter-spacing:.1em">Admin Panel</div>
          </div>
        </div>
        <div style="font-size:18px;font-weight:700;color:var(--charcoal);margin-bottom:4px">Admin access</div>
        <p style="font-size:13px;color:var(--charcoal-3);margin-bottom:1.5rem">This page is not for clients.</p>
        <div class="adm-field">
          <label>Admin password</label>
          <input class="adm-inp" type="password" id="admin-pw" placeholder="Enter password" autocomplete="off"/>
        </div>
        <div id="admin-err" class="adm-msg error">Incorrect password.</div>
        <button class="adm-btn adm-btn-primary" style="width:100%;justify-content:center;margin-top:10px" onclick="attemptAdminLogin()">Enter Admin Panel →</button>
      </div>
    </div>`;
  document.getElementById('al-logo').src = LOGO_CIRCLE;
  document.getElementById('admin-pw').addEventListener('keydown', e => { if(e.key==='Enter') attemptAdminLogin(); });
}

function attemptAdminLogin() {
  const pw = document.getElementById('admin-pw').value;
  if (pw === ADMIN_PASS) {
    sessionStorage.setItem('sa_admin_auth', ADMIN_PASS);
    adminAuthed = true; renderAdmin();
  } else {
    const err = document.getElementById('admin-err');
    err.style.display = 'block'; err.textContent = 'Incorrect password.';
  }
}

// ── Show/hide msg helper ──────────────────────────────────
function showMsg(id, type, text, duration=2800) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = `adm-msg ${type}`;
  el.textContent = text;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, duration);
}

// ════════════════════════════════════════════════════════
//  RENDER ADMIN
// ════════════════════════════════════════════════════════
function renderAdmin() {
  const p   = PROJECTS[activeProject];
  const nav = [
    { key:'tracker',   icon:`<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><line x1="1" y1="3.5" x2="13" y2="3.5"/><line x1="1" y1="7" x2="9" y2="7"/><line x1="1" y1="10.5" x2="11" y2="10.5"/></svg>`, label:'SAB Tracker'     },
    { key:'updates',   icon:`<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M1 10V3a1 1 0 011-1h10a1 1 0 011 1v6a1 1 0 01-1 1H4L1 12V10z"/></svg>`, label:'Project Updates' },
    { key:'timeline',  icon:`<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="2.5" cy="3.5" r="1.5"/><line x1="5" y1="3.5" x2="13" y2="3.5"/><circle cx="2.5" cy="7" r="1.5"/><line x1="5" y1="7" x2="13" y2="7"/></svg>`, label:'Milestones'        },
    { key:'budget',    icon:`<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><rect x=".5" y="1.5" width="13" height="11" rx="1"/><line x1=".5" y1="5" x2="13.5" y2="5"/><line x1="4.5" y1="5" x2="4.5" y2="12.5"/></svg>`, label:'Budget & Change Orders' },
    { key:'project',   icon:`<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="7" cy="4" r="2.5"/><path d="M1 12c0-3 2.7-5 6-5s6 2 6 5"/></svg>`, label:'Project Info'    },
    { key:'selections',icon:`<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M1 3.5l2 2 2.5-2.5"/><line x1="7" y1="4.5" x2="13" y2="4.5"/><path d="M1 9l2 2 2.5-2.5"/><line x1="7" y1="10" x2="13" y2="10"/></svg>`, label:'Selections'       },
    { key:'documents', icon:`<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3 1h5.5L11 3.5V13H3V1z"/><polyline points="8.5,1 8.5,4 11,4"/></svg>`, label:'Documents'       },
    { key:'photos',    icon:`<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="1" y="2" width="12" height="10" rx="1"/><circle cx="5" cy="6" r="1.5"/><path d="M1 11l3-3 2.5 2.5L10 7l3 4"/></svg>`, label:'Build Photos'    },
  ].map(n => `<div class="admin-nav-link ${activeView===n.key?'active':''}" onclick="activeView='${n.key}';sessionStorage.setItem('sa_admin_view','${n.key}');renderAdmin()">${n.icon}${n.label}</div>`).join('');

  const projectSelect = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap">
      <div style="flex:1;min-width:200px">
        <select class="adm-inp adm-sel" style="font-weight:600" onchange="activeProject=this.value;sessionStorage.setItem('sa_admin_project',this.value);renderAdmin()">
          ${Object.values(PROJECTS).map(proj =>
            `<option value="${proj.id}" ${proj.id===activeProject?'selected':''}>${proj.clientName} — ${proj.projectName}</option>`
          ).join('')}
        </select>
      </div>
      <button class="adm-btn adm-btn-ghost" onclick="activeView='addclient';sessionStorage.setItem('sa_admin_view','addclient');renderAdmin()" style="white-space:nowrap">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" style="width:12px;height:12px"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
        Add Client
      </button>
    </div>`;

  let mainContent = '';

  // ── TRACKER VIEW ──────────────────────────────────────
  if (activeView === 'tracker') {
    mainContent = renderTrackerView(p);
  }

  // ── UPDATES VIEW ─────────────────────────────────────
  else if (activeView === 'updates') {
    mainContent = renderUpdatesView(p);
  }

  // ── TIMELINE / MILESTONES VIEW ────────────────────────
  else if (activeView === 'timeline') {
    mainContent = renderTimelineView(p);
  }

  // ── BUDGET / CHANGE ORDERS VIEW ───────────────────────
  else if (activeView === 'budget') {
    mainContent = renderBudgetView(p);
  }

  // ── PROJECT INFO VIEW ─────────────────────────────────
  else if (activeView === 'project') {
    mainContent = renderProjectView(p);
  }

  // ── SELECTIONS VIEW ───────────────────────────────────
  else if (activeView === 'selections') {
    mainContent = renderSelectionsView(p);
  }

  // ── DOCUMENTS VIEW ────────────────────────────────────
  else if (activeView === 'documents') {
    mainContent = renderDocumentsView(p);
  }

  // ── PHOTOS VIEW ───────────────────────────────────────
  else if (activeView === 'photos') {
    mainContent = renderPhotosView(p);
  }

  // ── ADD CLIENT VIEW ───────────────────────────────────
  else if (activeView === 'addclient') {
    mainContent = renderAddClientView();
  }

  document.body.innerHTML = `
    <div class="admin-shell">
      <aside class="admin-sidebar">
        <div class="admin-logo">
          <img src="${LOGO_CIRCLE}" style="width:28px;height:28px;object-fit:contain">
          <div><div class="admin-logo-text">Six Arrows</div><div class="admin-logo-sub">Admin</div></div>
        </div>
        <div class="admin-nav-section">
          <div class="admin-nav-title">Manage</div>
          ${nav}
          <div style="height:1px;background:rgba(255,255,255,.07);margin:8px 0"></div>
          <div class="admin-nav-link ${activeView==='addclient'?'active':''}" onclick="activeView='addclient';sessionStorage.setItem('sa_admin_view','addclient');renderAdmin()">
            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" style="width:13px;height:13px;opacity:.6"><circle cx="7" cy="4" r="2.5"/><path d="M1 12c0-3 2.7-5 6-5s6 2 6 5"/><line x1="10.5" y1="2" x2="10.5" y2="6"/><line x1="8.5" y1="4" x2="12.5" y2="4"/></svg>
            Add New Client
          </div>
        </div>
        <div style="margin-top:auto;padding-top:1rem;border-top:0.5px solid rgba(255,255,255,.07)">
          <a href="index.html" style="font-size:11px;color:rgba(235,233,222,.35);text-decoration:none;display:block;padding:4px 9px">← Client portal</a>
        </div>
      </aside>
      <div class="admin-main">

// ════════════════════════════════════════════════════════
//  TRACKER VIEW — mark steps complete, set target dates
// ════════════════════════════════════════════════════════
function renderTrackerView(p) {
  const TS = getTrackerState(p);

  function isStepDone(pi, si) {
    const st = p.sabPhases[pi].steps[si];
    const items = getStepAllItems(st);
    if (items.length === 0) return !!st.complete;
    return items.every((_, ii) => TS[`${pi}-${si}-${ii}`]);
  }

  // Groundbreaking date from admin storage (overrides data.js default)
  const gbDate = adminGet(p.id, 'gbDate') || p.groundbreakingDate || '';

  let html = `
    <div class="card" style="margin-bottom:1rem">
      <div class="sh"><div class="sh-title">Groundbreaking Date</div></div>
      <p style="font-size:12px;color:var(--charcoal-3);margin-bottom:12px">Sets the countdown on the client's Command Center and Timeline.</p>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <input class="adm-inp" type="date" id="gb-date-inp" value="${gbDate}" style="width:auto">
        <button class="adm-btn adm-btn-green" onclick="saveGbDate('${p.id}')">Save Date</button>
        <span id="gb-date-msg" class="adm-msg success" style="margin:0"></span>
      </div>
    </div>`;

  p.sabPhases.forEach((ph, pi) => {
    html += `<div class="phase-section-hd">Phase ${pi+1} — ${ph.label}</div>`;
    ph.steps.forEach((step, si) => {
      const done      = isStepDone(pi, si);
      const dateKey   = `date-${pi}-${si}`;
      const dateVal   = TS[dateKey] || '';
      const items     = getStepAllItems(step);
      const checked   = items.filter((_, ii) => TS[`${pi}-${si}-${ii}`]).length;

      html += `<div class="step-manage-row" id="smr-${pi}-${si}">
        <div class="step-check ${done?'done':''}" onclick="toggleStepDone(${pi},${si},'${p.id}')">
          ${done?`<svg viewBox="0 0 9 9"><path d="M1.5 4.5l2 2 4-4" stroke="white" stroke-width="1.3" fill="none"/></svg>`:''}
        </div>
        <div class="step-manage-meta">
          <div class="step-manage-name">Step ${step.id+1}: ${step.title}</div>
          <div class="step-manage-date">${items.length>0?`${checked}/${items.length} items`:'No checklist'} ${step.owner?'· '+{sa:'Six Arrows',client:'Client',both:'Collaborative'}[step.owner]:''}${step.completedDate?' · Completed '+step.completedDate:''}</div>
        </div>
        <div class="step-manage-right">
          <div>
            <div style="font-size:10px;color:var(--charcoal-4);margin-bottom:3px">Target date</div>
            <input class="step-date-set" type="date" value="${dateVal}" onchange="setStepDate(${pi},${si},'${p.id}',this.value)">
          </div>
        </div>
      </div>`;
    });
  });

  return html;
}

function saveGbDate(projectId) {
  const val = document.getElementById('gb-date-inp')?.value;
  if (!val) return;
  adminSet(projectId, 'gbDate', val);
  // Update in-memory project so other views see it immediately
  const p  = PROJECTS[projectId];
  p.groundbreakingDate = val;
  if (PROJECTS[projectId]) PROJECTS[projectId].groundbreakingDate = val;
  // Also write to tracker state so the portal countdown picks it up
  const TS = getTrackerState(p);
  TS['groundbreakingDate'] = val;
  setTrackerState(p, TS);
  // Persist to Supabase
  const sbH = { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
  fetch(`${SUPABASE_DIRECT_URL}/rest/v1/clients?id=eq.${projectId}`, {
    method: 'PATCH',
    headers: sbH,
    body: JSON.stringify({ groundbreaking_date: val }),
  }).then(async res => {
    if (res.ok) {
      showMsg('gb-date-msg', 'success', 'Saved ✓');
    } else {
      const err = await res.text();
      console.error('saveGbDate PATCH failed:', res.status, err);
      showMsg('gb-date-msg', 'success', 'Saved locally ✓');
    }
  }).catch(() => showMsg('gb-date-msg', 'success', 'Saved locally ✓'));
}

function toggleStepDone(pi, si, projectId) {
  const p    = PROJECTS[projectId];
  const TS   = getTrackerState(p);
  const step = p.sabPhases[pi].steps[si];
  const items = getStepAllItems(step);
  const done = items.length === 0 ? !!step.complete
    : items.every((_, ii) => TS[`${pi}-${si}-${ii}`]);

  if (!done) {
    // Mark all items complete
    items.forEach((_, ii) => { TS[`${pi}-${si}-${ii}`] = true; });
    // Store completion date
    const today = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    TS[`completed-date-${pi}-${si}`] = today;
    step.complete = true;
  } else {
    // Unmark all items
    items.forEach((_, ii) => { TS[`${pi}-${si}-${ii}`] = false; });
    delete TS[`completed-date-${pi}-${si}`];
    step.complete = false;
  }

  setTrackerState(p, TS);
  renderAdmin(); // re-render to reflect change
}

function setStepDate(pi, si, projectId, val) {
  const p  = PROJECTS[projectId];
  const TS = getTrackerState(p);
  TS[`date-${pi}-${si}`] = val;
  setTrackerState(p, TS);
}

async function postUpdate(projectId) {
  const title     = document.getElementById('upd-title')?.value.trim();
  const body      = document.getElementById('upd-body')?.value.trim();
  const btn       = document.querySelector('[onclick*="postUpdate"]');
  if (!title || !body) { showMsg('upd-msg','error','Title and message required.'); return; }
  const date = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

  // Try Supabase first
  try {
    const res = await fetch(`/.netlify/functions/client-updates?clientId=${projectId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, updateBody: body, date }),
    });
    if (res.ok) {
      showMsg('upd-msg','success','Update posted ✓');
      document.getElementById('upd-title').value = '';
      document.getElementById('upd-body').value = '';
      setTimeout(() => renderAdmin(), 800);
      return;
    }
  } catch(e) {}

  // Fallback: localStorage
  const updates = adminGet(projectId, 'updates') || [];
  updates.push({ date, title, body });
  adminSet(projectId, 'updates', updates);
  showMsg('upd-msg','success','Update posted (local) ✓');
  setTimeout(() => renderAdmin(), 800);
}

async function deleteUpdate(projectId, updateId, idx) {
  // Try Supabase delete by ID
  if (updateId) {
    try {
      await fetch(`/.netlify/functions/client-updates?clientId=${projectId}&updateId=${updateId}`, {
        method: 'DELETE',
      });
    } catch(e) {}
  }
  // Also remove from localStorage
  const updates = adminGet(projectId, 'updates') || [];
  if (idx !== undefined) updates.splice(idx, 1);
  adminSet(projectId, 'updates', updates);
  renderAdmin();
}

async function updateBudgetCatStatus(projectId, catIndex, newStatus) {
  const p = PROJECTS[projectId];
  if (!p.budgetCategories || !p.budgetCategories[catIndex]) return;
  p.budgetCategories[catIndex].status = newStatus;
  adminSet(projectId, 'budgetCats', p.budgetCategories);
  // Push to Supabase
  try {
    const cat = p.budgetCategories[catIndex];
    // Get the actual Supabase row ID by fetching categories
    const res = await fetch(`${SUPABASE_DIRECT_URL}/rest/v1/budget_categories?client_id=eq.${projectId}&order=sort_order.asc&select=id,name`, {
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON }
    });
    if (res.ok) {
      const rows = await res.json();
      const row = rows[catIndex];
      if (row?.id) {
        await fetch(`${SUPABASE_DIRECT_URL}/rest/v1/budget_categories?id=eq.${row.id}`, {
          method: 'PATCH',
          headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
          body: JSON.stringify({ status: newStatus }),
        });
        showMsg('bcat-status-msg','success','Saved ✓');
        setTimeout(() => document.getElementById('bcat-status-msg').textContent = '', 2000);
        // Update PROJECTS in memory immediately
        if (PROJECTS[projectId] && PROJECTS[projectId].budgetCategories[catIndex]) {
          PROJECTS[projectId].budgetCategories[catIndex].status = newStatus;
        }
        // Invalidate client session so they get fresh data on next load
        try {
          const raw = localStorage.getItem('sa_session_v3');
          if (raw) {
            const s = JSON.parse(raw);
            if (s.id === projectId) {
              // Force re-fetch by zeroing the timestamp
              s.ts = 0;
              localStorage.setItem('sa_session_v3', JSON.stringify(s));
            }
          }
        } catch(e) {}
      }
    }
  } catch(e) { console.log('Budget status update error:', e); }
}

function saveProjectInfo(projectId) {
  const p = PROJECTS[projectId];
  p.clientName      = document.getElementById('pi-clientName')?.value.trim()  || p.clientName;
  p.projectName     = document.getElementById('pi-projectName')?.value.trim() || p.projectName;
  p.location        = document.getElementById('pi-location')?.value.trim()    || p.location;
  p.statusType      = document.getElementById('pi-statusType')?.value         || p.statusType;
  p.phaseLabel      = document.getElementById('pi-phaseLabel')?.value.trim()  || p.phaseLabel;
  p.constructionPct = parseInt(document.getElementById('pi-conPct')?.value)   || 0;
  p.timelineStart      = document.getElementById('pi-tlStart')?.value.trim()  || p.timelineStart;
  p.timelineTarget     = document.getElementById('pi-tlTarget')?.value.trim() || p.timelineTarget;
  p.groundbreakingDate = document.getElementById('pi-gbDate')?.value ?? p.groundbreakingDate ?? '';
  if (PROJECTS[projectId]) PROJECTS[projectId].groundbreakingDate = p.groundbreakingDate;
  const budgetLink = document.getElementById('pi-budgetLink')?.value.trim() || '';
  const notionId   = document.getElementById('pi-notionId')?.value.trim()   || '';
  const cxName  = document.getElementById('pi-cxName')?.value.trim()  || p.cxName  || 'Cole Borders';
  const cxPhone = document.getElementById('pi-cxPhone')?.value.trim() || p.cxPhone || '(270) 782-5388';
  const cxEmail = document.getElementById('pi-cxEmail')?.value.trim() || p.cxEmail || 'cole@sixarrowsconstruction.com';
  const pmName  = document.getElementById('pi-pmName')?.value.trim()  || p.pmName  || '';
  const pmPhone = document.getElementById('pi-pmPhone')?.value.trim() || p.pmPhone || '';
  const pmEmail = document.getElementById('pi-pmEmail')?.value.trim() || p.pmEmail || '';
  // Keep legacy teamLead for backwards compat
  const teamLead  = cxName; const teamPhone = cxPhone; const teamEmail = cxEmail;
  if (!p.links) p.links = {};
  p.links.budget = budgetLink;
  p.notionTrackerPageId = notionId || p.notionTrackerPageId;
  p.cxName = cxName; p.cxPhone = cxPhone; p.cxEmail = cxEmail;
  p.pmName = pmName; p.pmPhone = pmPhone; p.pmEmail = pmEmail;
  p.teamLead = cxName; p.teamPhone = cxPhone; p.teamEmail = cxEmail;
  if (PROJECTS[projectId]) {
    if (!PROJECTS[projectId].links) PROJECTS[projectId].links = {};
    PROJECTS[projectId].links.budget = budgetLink;
    PROJECTS[projectId].notionTrackerPageId = p.notionTrackerPageId;
    PROJECTS[projectId].cxName  = cxName;  PROJECTS[projectId].cxPhone = cxPhone;  PROJECTS[projectId].cxEmail = cxEmail;
    PROJECTS[projectId].pmName  = pmName;  PROJECTS[projectId].pmPhone = pmPhone;  PROJECTS[projectId].pmEmail = pmEmail;
    PROJECTS[projectId].teamLead = cxName; PROJECTS[projectId].teamPhone = cxPhone; PROJECTS[projectId].teamEmail = cxEmail;
  }
  // Persist to localStorage override
  adminSet(projectId, 'projectOverride', { clientName:p.clientName, projectName:p.projectName, location:p.location, statusType:p.statusType, phaseLabel:p.phaseLabel, constructionPct:p.constructionPct, timelineStart:p.timelineStart, timelineTarget:p.timelineTarget, budgetLink, notionTrackerPageId: p.notionTrackerPageId });
  // Update the cached session so budget page sees the link immediately
  try {
    const raw = localStorage.getItem('sa_session_v3');
    if (raw) {
      const s = JSON.parse(raw);
      if (s.data && s.data.id === projectId) {
        if (!s.data.links) s.data.links = {};
        s.data.links.budget = budgetLink;
        s.data.notionTrackerPageId = p.notionTrackerPageId;
        localStorage.setItem('sa_session_v3', JSON.stringify(s));
      }
    }
  } catch(e) {}
  // Push to Supabase
  // Push to Supabase directly
  const sbH = { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
  fetch(`${SUPABASE_DIRECT_URL}/rest/v1/clients?id=eq.${projectId}`, {
    method: 'PATCH',
    headers: sbH,
    body: JSON.stringify({
      client_name: p.clientName, project_name: p.projectName, location: p.location,
      status_type: p.statusType, phase_label: p.phaseLabel, construction_pct: p.constructionPct,
      timeline_start: p.timelineStart, timeline_target: p.timelineTarget,
      notion_tracker_page_id: p.notionTrackerPageId,
      budget_link: budgetLink,
      team_lead: cxName, team_phone: cxPhone, team_email: cxEmail,
      cx_name: cxName, cx_phone: cxPhone, cx_email: cxEmail,
      pm_name: pmName, pm_phone: pmPhone, pm_email: pmEmail,
      groundbreaking_date: p.groundbreakingDate || null,
      show_review_card: !!p.showReviewCard,
      review_left: !!p.reviewLeft,
    }),
  }).catch(() => {});
  showMsg('pi-msg','success','Saved ✓');
}

  const sbH = { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
  fetch(`${SUPABASE_DIRECT_URL}/rest/v1/clients?id=eq.${projectId}`, {
    method: 'PATCH', headers: sbH,
    body: JSON.stringify({ show_review_card: checked }),
  }).then(async res => {
    if (res.ok) {
      showMsg('pi-review-msg','success', checked ? 'Review card enabled ✓' : 'Review card hidden ✓');
    } else {
      const err = await res.text();
      console.error('saveShowReviewCard PATCH failed:', res.status, err);
      showMsg('pi-review-msg','error', `Save failed: ${res.status} — run add-review-fields.sql in Supabase`);
    }
  }).catch(err => {
    console.error('saveShowReviewCard error:', err);
    showMsg('pi-review-msg','error','Network error — check console');
  });
}

function buildSelectionsContent(ck, p, saved, answers) {
  const ALL_CATS = [
    { id:'fireplace',wave:0,name:'Fireplace' },{ id:'appliances',wave:0,name:'Appliances' },
    { id:'exterior_finishes',wave:0,name:'Exterior Finishes' },
    { id:'specialty_trim',wave:1,name:'Specialty Trim' },{ id:'flooring',wave:1,name:'Flooring' },{ id:'tile',wave:1,name:'Tile' },
    { id:'plumbing',wave:2,name:'Plumbing Fixtures' },{ id:'lighting',wave:2,name:'Lighting Fixtures' },
    { id:'countertops',wave:2,name:'Countertops' },{ id:'hardware',wave:2,name:'Hardware' },
    { id:'paint',wave:2,name:'Paint & Stain' },{ id:'doors',wave:2,name:'Interior Doors & Trim' },
  ];
  function catDone(id) {
    if (id==='fireplace' && answers['fireplace_fp_want']==='No — no fireplace') return true;
    return !!saved[id];
  }
  // Get a readable answer preview for a category
  function catPreview(id) {
    const keys = Object.keys(answers).filter(k => k.startsWith(id+'_') && answers[k] && typeof answers[k] === 'string' && answers[k].length < 60);
    return keys.slice(0,2).map(k => answers[k]).filter(Boolean).join(' · ') || '';
  }

  const done = ALL_CATS.filter(c => catDone(c.id)).length;
  const pct  = Math.round(done/ALL_CATS.length*100);
  const waves = [
    { label:'Wave 1 — Structure', cats:ALL_CATS.filter(c=>c.wave===0) },
    { label:'Wave 2 — The Shell', cats:ALL_CATS.filter(c=>c.wave===1) },
    { label:'Wave 3 — The Jewelry', cats:ALL_CATS.filter(c=>c.wave===2) },
  ];

  return `
    <div class="card dark" style="margin-bottom:1rem">
      <div class="kpi"><div class="kpi-lbl">Selections Complete</div><div class="kpi-val">${pct}%</div><div class="kpi-sub">${done} of ${ALL_CATS.length} categories</div></div>
      <div class="track" style="margin-top:11px;background:rgba(255,255,255,.1)"><div class="bar" style="width:${pct}%"></div></div>
    </div>
    <div class="card" style="margin-bottom:1rem">
      <div class="sh"><div class="sh-title">Category Detail</div></div>
      ${waves.map(w => `
        <div class="phase-section-hd">${w.label}</div>
        ${w.cats.map(cat => {
          const isDone    = catDone(cat.id);
          const preview   = catPreview(cat.id);
          return `<div style="padding:9px 0;border-bottom:0.5px solid var(--border)">
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:7px;height:7px;border-radius:50%;background:${isDone?'var(--green)':'var(--cream-3)'};flex-shrink:0;margin-top:1px"></div>
              <div style="flex:1;font-size:13px;font-weight:500;color:var(--charcoal)">${cat.name}</div>
              <span class="${isDone?'tag ok':'tag'}" style="font-size:9px;${!isDone?'background:var(--cream-2);color:var(--charcoal-4)':''}">${isDone?'Complete':'Pending'}</span>
            </div>
            ${preview ? `<div style="font-size:11px;color:var(--charcoal-3);margin-top:3px;padding-left:17px;line-height:1.4">${preview}</div>` : ''}
          </div>`;
        }).join('')}`).join('')}
    </div>`;
}

async function addAdminDoc(projectId) {
  const name = document.getElementById('adm-doc-name')?.value.trim();
  const url  = document.getElementById('adm-doc-url')?.value.trim();
  const cat  = document.getElementById('adm-doc-cat')?.value;
  const type = document.getElementById('adm-doc-type')?.value;
  const note = document.getElementById('adm-doc-note')?.value.trim();
  if (!name || !url) { showMsg('adm-doc-msg','error','Name and URL required.'); return; }
  const now = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  let previewUrl = url;
  if (type==='pdf' && url.includes('drive.google.com/file/d/')) {
    previewUrl = url.replace('/view','/preview').replace('/edit','/preview');
    if (!previewUrl.includes('/preview')) previewUrl += '/preview';
  }
  const sbH = { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
  try {
    const res = await fetch(`${SUPABASE_DIRECT_URL}/rest/v1/documents`, {
      method: 'POST',
      headers: sbH,
      body: JSON.stringify({ client_id: projectId, name, category: cat, url: previewUrl, type, date: now, note: note||'' }),
    });
    if (!res.ok) { const err = await res.text(); showMsg('adm-doc-msg','error','Save failed: '+err); return; }
    // Also update PROJECTS in memory
    if (!PROJECTS[projectId].documents) PROJECTS[projectId].documents = [];
    PROJECTS[projectId].documents.push({ id:'adm'+Date.now(), category:cat, name, url:previewUrl, type, date:now, note });
    showMsg('adm-doc-msg','success','Added ✓ — visible to client immediately');
    setTimeout(() => renderAdmin(), 600);
  } catch(e) { showMsg('adm-doc-msg','error','Error: '+e.message); }
}

async function removeAdminDoc(projectId, docId) {
  const sbH = { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}`, 'Prefer': 'return=minimal' };
  try {
    await fetch(`${SUPABASE_DIRECT_URL}/rest/v1/documents?id=eq.${docId}&client_id=eq.${projectId}`, {
      method: 'DELETE', headers: sbH,
    });
    if (PROJECTS[projectId].documents) {
      PROJECTS[projectId].documents = PROJECTS[projectId].documents.filter(d => d.id != docId);
    }
    renderAdmin();
  } catch(e) { console.error('removeAdminDoc error:', e); }
}

function renderPhotosView(p) {
  const PHOTO_KEY = `sa_photos_${p.id}`;
  const basePhotos = (p.documents||[]).filter(d=>d.category==='photos');
  let adminPhotos = [];
  try { adminPhotos = JSON.parse(localStorage.getItem(PHOTO_KEY)||'[]'); } catch(e) {}

  const PHASES = [{id:'pre',label:'Pre-Construction'},{id:'foundation',label:'Foundation'},{id:'framing',label:'Framing'},{id:'mechanical',label:'Mechanical'},{id:'finishes',label:'Finishes'},{id:'completion',label:'Completion'}];
  const PHASE_MAP = Object.fromEntries(PHASES.map(p=>[p.id,p.label]));

  return `
    <div class="card" style="margin-bottom:1rem">
      <div class="sh"><div class="sh-title">Add Build Photo</div></div>
      <div class="adm-grid2">
        <div class="adm-field"><label>Caption</label><input class="adm-inp" id="adm-ph-caption" type="text" placeholder="e.g. Framing complete — east wall"></div>
        <div class="adm-field"><label>Build Phase</label><select class="adm-inp adm-sel" id="adm-ph-phase">${PHASES.map(ph=>`<option value="${ph.id}">${ph.label}</option>`).join('')}</select></div>
      </div>
      <div class="adm-field"><label>Google Drive Image URL</label><input class="adm-inp" id="adm-ph-url" type="text" placeholder="https://drive.google.com/file/d/..."></div>
      <div class="adm-field"><label>Date</label><input class="adm-inp adm-inp" id="adm-ph-date" type="date" style="width:auto"></div>
      <button class="adm-btn adm-btn-green" onclick="addAdminPhoto('${p.id}')">Add Photo →</button>
      <span id="adm-ph-msg" class="adm-msg success" style="margin-left:10px"></span>
    </div>
    <div class="card">
      <div class="sh"><div class="sh-title">All Photos (${allPhotos.length})</div></div>
      ${allPhotos.length===0?`<div style="text-align:center;padding:2rem;font-size:13px;color:var(--charcoal-4)">No photos yet.</div>`
        :`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px">
          ${allPhotos.map((ph,i)=>{const isAdmin=i>=basePhotos.length;const match=(ph.url||'').match(/\/file\/d\/([^\/\?]+)/);const imgUrl=match?`https://drive.google.com/uc?export=view&id=${match[1]}`:ph.url;return`<div style="position:relative;border-radius:8px;overflow:hidden;aspect-ratio:4/3;background:var(--cream-2);border:0.5px solid var(--border)"><img src="${imgUrl}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'"><div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);padding:3px 5px"><div style="font-size:9px;color:white">${ph.caption||'—'}</div><div style="font-size:8px;color:rgba(255,255,255,.6)">${PHASE_MAP[ph.phase]||''}</div></div>${isAdmin?`<button onclick="removeAdminPhoto('${p.id}',${i-basePhotos.length})" style="position:absolute;top:3px;right:3px;background:rgba(184,50,50,.85);border:none;border-radius:50%;width:18px;height:18px;color:white;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;line-height:1">×</button>`:''}</div>`;}).join('')}
        </div>`}
    </div>`;
}

function addAdminPhoto(projectId) {
  const caption = document.getElementById('adm-ph-caption')?.value.trim();
  const url     = document.getElementById('adm-ph-url')?.value.trim();
  const phase   = document.getElementById('adm-ph-phase')?.value;
  const dateVal = document.getElementById('adm-ph-date')?.value;
  if (!url) { showMsg('adm-ph-msg','error','Image URL required.'); return; }
  const PHOTO_KEY = `sa_photos_${projectId}`;
  let photos = [];
  try { photos = JSON.parse(localStorage.getItem(PHOTO_KEY)||'[]'); } catch(e) {}
  const dateLabel = dateVal ? new Date(dateVal+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  photos.push({ id:'adm'+Date.now(), category:'photos', phase, caption, url, date:dateLabel });
  localStorage.setItem(PHOTO_KEY, JSON.stringify(photos));
  showMsg('adm-ph-msg','success','Added ✓');
  setTimeout(() => renderAdmin(), 600);
}

function removeAdminPhoto(projectId, idx) {
  const PHOTO_KEY = `sa_photos_${projectId}`;
  let photos = [];
  try { photos = JSON.parse(localStorage.getItem(PHOTO_KEY)||'[]'); } catch(e) {}
  photos.splice(idx, 1);
  localStorage.setItem(PHOTO_KEY, JSON.stringify(photos));
  renderAdmin();
}

function copyClientEntry() {
