<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Share Your Experience — Six Arrows</title>
<link rel="stylesheet" href="style.css"/>
<script src="data.js"></script><script src="app.js"></script>
<style>

/* ── Hero block ── */
.review-hero {
  background:var(--charcoal);
  border-radius:var(--r-2xl);
  padding:2rem 1.75rem 1.75rem;
  margin-bottom:1rem;
  position:relative;
  overflow:hidden;
}
.review-hero::before {
  content:'';
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(117,127,105,.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(117,127,105,.07) 1px,transparent 1px);
  background-size:28px 28px;
  pointer-events:none;
}
.review-hero-inner { position:relative; z-index:1; }
.review-star-row {
  display:flex; gap:5px; margin-bottom:1rem;
}
.review-star {
  font-size:22px; line-height:1;
}
.review-headline {
  font-size:22px; font-weight:700;
  color:var(--cream); line-height:1.2;
  margin-bottom:.5rem; letter-spacing:-.02em;
}
.review-sub {
  font-size:13px; color:rgba(235,233,222,.45);
  line-height:1.6; max-width:520px;
}

/* ── Draft review card ── */
.review-draft-card {
  background:var(--white);
  border:0.5px solid var(--border);
  border-radius:var(--r-xl);
  padding:1.5rem 1.625rem;
  margin-bottom:1rem;
}
.review-draft-label {
  font-size:9px; font-weight:700; text-transform:uppercase;
  letter-spacing:.14em; color:var(--green-dk); margin-bottom:.625rem;
  display:flex; align-items:center; gap:7px;
}
.review-draft-label::after {
  content:'';
  flex:1; height:0.5px; background:var(--border-2);
}
.review-draft-text {
  font-size:14px; color:var(--charcoal-2);
  line-height:1.7; white-space:pre-line;
  margin-bottom:1.125rem;
  font-style:italic;
}
.review-draft-note {
  font-size:11px; color:var(--charcoal-4);
  line-height:1.5; margin-bottom:1.125rem;
}
.copy-btn {
  display:inline-flex; align-items:center; gap:7px;
  background:var(--green-lt);
  border:0.5px solid rgba(117,127,105,.25);
  border-radius:var(--r-sm);
  padding:8px 16px;
  font-size:12px; font-weight:600;
  color:var(--green-deep);
  cursor:pointer; transition:background .15s, border-color .15s;
  text-decoration:none; user-select:none;
}
.copy-btn:hover { background:#dce3d6; border-color:rgba(117,127,105,.4); }
.copy-btn svg { width:13px; height:13px; flex-shrink:0; }
.copy-confirm {
  display:inline-flex; align-items:center; gap:6px;
  font-size:12px; font-weight:600; color:var(--green-dk);
  margin-left:12px; opacity:0;
  transition:opacity .2s;
}
.copy-confirm.show { opacity:1; }

/* ── Steps ── */
.review-steps {
  display:flex; flex-direction:column; gap:0;
  margin-bottom:1rem;
  background:var(--white);
  border:0.5px solid var(--border);
  border-radius:var(--r-xl);
  overflow:hidden;
}
.review-step {
  display:flex; align-items:flex-start; gap:14px;
  padding:1.125rem 1.5rem;
  border-bottom:0.5px solid var(--border);
}
.review-step:last-child { border-bottom:none; }
.step-num {
  width:28px; height:28px; border-radius:50%;
  background:var(--green-lt);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; color:var(--green-dk);
  flex-shrink:0; margin-top:1px;
}
.step-body { flex:1; }
.step-title {
  font-size:13px; font-weight:600; color:var(--charcoal);
  margin-bottom:2px;
}
.step-note { font-size:12px; color:var(--charcoal-3); line-height:1.5; }

/* ── Google review button ── */
.google-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  background:var(--charcoal);
  border-radius:var(--r-lg);
  padding:1rem 1.5rem;
  text-decoration:none;
  color:var(--cream);
  font-size:14px; font-weight:600;
  transition:opacity .15s;
  cursor:pointer;
}
.google-btn:hover { opacity:.88; }
.google-btn-ico {
  width:22px; height:22px; flex-shrink:0;
}
.google-btn-sub {
  font-size:10px; font-weight:400;
  color:rgba(235,233,222,.45);
  margin-top:1px;
}

/* ── Already left review banner ── */
.review-done-banner {
  background:var(--green-pale);
  border:0.5px solid rgba(117,127,105,.2);
  border-radius:var(--r-xl);
  padding:1.125rem 1.5rem;
  display:flex; align-items:center; gap:14px;
  margin-bottom:1rem;
}
.review-done-check {
  width:32px; height:32px; border-radius:50%;
  background:var(--green);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.review-done-check svg { width:14px; height:14px; }
.review-done-body { flex:1; }
.review-done-title { font-size:14px; font-weight:600; color:var(--green-deep); margin-bottom:2px; }
.review-done-sub   { font-size:12px; color:var(--green-dk); opacity:.7; }

/* ── Confirm button ── */
.confirm-btn {
  width:100%;
  background:var(--green);
  border:none; border-radius:var(--r-lg);
  padding:1rem; margin-top:.75rem;
  font-size:14px; font-weight:700;
  color:white; cursor:pointer;
  transition:opacity .15s;
  letter-spacing:.01em;
}
.confirm-btn:hover { opacity:.88; }
.confirm-btn:disabled { opacity:.45; cursor:default; }

@media (max-width:640px) {
  .review-hero { padding:1.5rem 1.25rem 1.25rem; }
  .review-headline { font-size:18px; }
  .review-draft-card { padding:1.25rem; }
}
</style>
</head>
<body>
<script>
async function initShare() {
  let p = AUTH.requireAuth();
  if (!p) return;

  // Refresh session to get latest review_left / review_draft from Supabase
  try {
    const fresh = await AUTH.refreshSession(p.id);
    if (fresh) p = fresh;
  } catch(e) {}

  const reviewLeft  = !!p.reviewLeft;
  const reviewDraft = (p.reviewDraft || '').trim();
  const GOOGLE_URL  = 'https://g.page/r/CSMkLW9NczscEAE/review';

  // ── Copy to clipboard helper ─────────────────────────
  window.copyReview = function() {
    if (!reviewDraft) return;
    navigator.clipboard.writeText(reviewDraft).then(() => {
      const el = document.getElementById('copy-confirm');
      if (el) { el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2200); }
    }).catch(() => {
      // fallback — select the textarea
      const ta = document.getElementById('review-text-area');
      if (ta) { ta.select(); document.execCommand('copy'); }
    });
  };

  // ── "I left my review" confirm ──────────────────────
  window.confirmReview = async function() {
    const btn = document.getElementById('confirm-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
    try {
      // Direct Supabase PATCH — anon key is intentionally public (RLS handles security)
      const SB_URL  = 'https://mtvcahscwpralmlqlnzg.supabase.co';
      const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10dmNhaHNjd3ByYWxtbHFsbnpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MTY4ODEsImV4cCI6MjA5MDM5Mjg4MX0.givpTh-YxG16vYZmn0KLBCPG0ivxYbjh-i8Q87eCNnk';
      await fetch(`${SB_URL}/rest/v1/clients?id=eq.${p.id}`, {
        method: 'PATCH',
        headers: {
          'apikey': SB_ANON,
          'Authorization': `Bearer ${SB_ANON}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify({ review_left: true }),
      });
    } catch(e) { console.log('review_left patch error:', e.message); }
    // Update local session immediately
    try {
      const raw = localStorage.getItem('sa_session_v3');
      if (raw) {
        const s = JSON.parse(raw);
        if (s.data) { s.data.reviewLeft = true; localStorage.setItem('sa_session_v3', JSON.stringify(s)); }
      }
    } catch(e) {}
    // Re-render to show "done" state
    renderShare(p, true, reviewDraft);
  };

  renderShare(p, reviewLeft, reviewDraft);
}

function renderShare(p, reviewLeft, reviewDraft) {
  const GOOGLE_URL = 'https://g.page/r/CSMkLW9NczscEAE/review';

  const draftSection = reviewDraft ? `
    <div class="review-draft-card">
      <div class="review-draft-label">Your story — written for you</div>
      <div class="review-draft-text" id="review-draft-display">${reviewDraft}</div>
      <textarea id="review-text-area" style="position:absolute;opacity:0;pointer-events:none;left:-9999px">${reviewDraft}</textarea>
      <p class="review-draft-note">This is a starting point — feel free to use it as-is or personalize it once you're on Google. The most important thing is that it's your voice telling your story.</p>
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px">
        <button class="copy-btn" onclick="copyReview()">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="4" y="4" width="9" height="9" rx="1"/><path d="M2 10V2a1 1 0 011-1h8"/></svg>
          Copy review text
        </button>
        <span class="copy-confirm" id="copy-confirm">
          <svg viewBox="0 0 14 14" fill="none" stroke="var(--green-dk)" stroke-width="1.5"><path d="M2 7l3.5 3.5 6.5-7" stroke-linecap="round"/></svg>
          Copied!
        </span>
      </div>
    </div>` : `
    <div class="review-draft-card">
      <div class="review-draft-label">Your story</div>
      <p style="font-size:13px;color:var(--charcoal-3);line-height:1.65;margin-bottom:0">
        When you click the button below, you'll land directly on Six Arrows' Google page. Share whatever feels honest — what the process was like, how it felt to have everything planned before construction started, and what working with the team has been like.
      </p>
    </div>`;

  const stepsSection = `
    <div class="review-steps">
      <div class="review-step">
        <div class="step-num">1</div>
        <div class="step-body">
          <div class="step-title">${reviewDraft ? 'Copy the text above' : 'Think about your experience'}</div>
          <div class="step-note">${reviewDraft ? 'Hit "Copy review text" — it\'s ready to paste into Google.' : 'Your honest words about the SAB™ process and what it meant to have this level of planning.'}</div>
        </div>
      </div>
      <div class="review-step">
        <div class="step-num">2</div>
        <div class="step-body">
          <div class="step-title">Open the Google review page</div>
          <div class="step-note">Click the button below — it takes you directly to our Google review form. Takes about 60 seconds.</div>
        </div>
      </div>
      <div class="review-step">
        <div class="step-num">3</div>
        <div class="step-body">
          <div class="step-title">${reviewDraft ? 'Paste, personalize, and post' : 'Write and post your review'}</div>
          <div class="step-note">${reviewDraft ? 'Paste the text, make it your own if you\'d like, select 5 stars, and hit post.' : 'Select 5 stars, write what felt true to you, and post. It helps other families find the right builder.'}</div>
        </div>
      </div>
    </div>`;

  const confirmSection = reviewLeft ? `
    <div class="review-done-banner">
      <div class="review-done-check">
        <svg viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round"><path d="M2.5 7l3.5 3.5 5.5-6"/></svg>
      </div>
      <div class="review-done-body">
        <div class="review-done-title">Review shared — thank you.</div>
        <div class="review-done-sub">Your Six Arrows team has been notified. We're grateful.</div>
      </div>
    </div>` : `
    <div class="card" style="margin-top:1rem">
      <div style="font-size:13px;font-weight:600;color:var(--charcoal);margin-bottom:4px">Done? Let us know.</div>
      <div style="font-size:12px;color:var(--charcoal-3);line-height:1.55;margin-bottom:2px">
        Once you've posted your review on Google, tap below. This removes the review prompt from your Command Center and lets your Six Arrows team know you've completed the final SAB™ step.
      </div>
      <button class="confirm-btn" id="confirm-btn" onclick="confirmReview()">✓ &nbsp;I've left my Google review</button>
    </div>`;

  mountLayout('share', 'Share Your Experience', `
    <div class="page-eyebrow">Final Step</div>
    <div class="page-title">Share Your Experience</div>
    <p class="page-sub">You've just completed one of the most thorough pre-construction processes in the industry. Other families are making this same decision right now — your story helps them choose the right path.</p>

    <div class="review-hero">
      <div class="review-hero-inner">
        <div class="review-star-row">
          <span class="review-star">★</span><span class="review-star">★</span><span class="review-star">★</span><span class="review-star">★</span><span class="review-star">★</span>
        </div>
        <div class="review-headline">Your words matter more<br>than any ad we could run.</div>
        <div class="review-sub">Families choosing a custom home builder are making one of the biggest financial decisions of their lives. A real review from someone who went through the process gives them something no marketing can — the truth.</div>
      </div>
    </div>

    ${draftSection}
    ${stepsSection}

    <a href="${GOOGLE_URL}" target="_blank" class="google-btn" onclick="setTimeout(()=>{ const el=document.getElementById('confirm-btn'); if(el && !el.disabled) el.style.background='var(--green)'; },4000)">
      <svg class="google-btn-ico" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <div>
        <div>Leave a Google Review</div>
        <div class="google-btn-sub">Opens in a new tab · takes ~60 seconds</div>
      </div>
    </a>

    ${confirmSection}
  `);
}

initShare();
</script>
</body>
</html>
