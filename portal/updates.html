<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Updates — Six Arrows</title>
<link rel="stylesheet" href="style.css"/>
<script src="data.js"></script><script src="app.js"></script>
</head>
<body>
<script>
const p = AUTH.requireAuth();
if (p) {
  const MAX_VISIBLE = 3;
  const showAll     = new URLSearchParams(window.location.search).get('all') === '1';

  // ── Load updates: Netlify function first, localStorage fallback ──
  async function loadUpdates() {
    let allUpdates = [];
    let loadedFromServer = false;

    // Try Netlify function (has approved + draft updates)
    try {
      const res = await fetch(`/.netlify/functions/client-updates?clientId=${p.id}`);
      if (res.ok) {
        const data = await res.json();
        allUpdates = data.updates || [];
        loadedFromServer = true;
      }
    } catch(e) {
      console.log('Updates function unavailable, using local state');
    }

    // Fall back to localStorage admin updates + data.js base updates
    if (!loadedFromServer) {
      const baseUpdates = p.updates || [];
      let adminUpdates = [];
      try { adminUpdates = JSON.parse(localStorage.getItem(`sa_admin_${p.id}_updates`) || '[]'); } catch(e) {}
      allUpdates = [...adminUpdates].reverse().concat(baseUpdates);
    }

    const visible = showAll ? allUpdates : allUpdates.slice(0, MAX_VISIBLE);
    const hasMore = allUpdates.length > MAX_VISIBLE;
    renderUpdates(allUpdates, visible, hasMore);
  }

  function renderUpdates(allUpdates, visible, hasMore) {
    mountLayout('updates', 'Updates', `
    <div class="page-eyebrow">Communication</div>
    <div class="page-title">Project Updates</div>
    <p class="page-sub">Notes, decisions, and milestones from your Six Arrows team.</p>
    <div class="grid g2">
      <div class="card">
        <div class="sh">
          <div class="sh-title">Project Updates</div>
          ${allUpdates.length > 0 ? `<span class="tag neutral">${allUpdates.length} total</span>` : ''}
        </div>
        ${visible.length > 0
          ? visible.map(u=>`<div class="upd-item"><div class="upd-date">${u.date}</div><div class="upd-title">${u.title}</div><div class="upd-body">${u.body}</div></div>`).join('')
          : `<div style="text-align:center;padding:2rem 1rem">
               <div style="font-size:28px;margin-bottom:10px">📋</div>
               <div style="font-size:14px;font-weight:600;color:var(--charcoal-3);margin-bottom:5px">No updates yet</div>
               <div style="font-size:12px;color:var(--charcoal-4);line-height:1.55">Your Six Arrows team will post updates here as your project progresses.</div>
             </div>`
        }
        ${hasMore && !showAll
          ? `<div style="padding-top:10px;border-top:0.5px solid var(--border);margin-top:4px">
               <a href="updates.html?all=1" style="font-size:12px;font-weight:600;color:var(--green-dk);text-decoration:none">View all ${allUpdates.length} updates →</a>
             </div>`
          : showAll && allUpdates.length > MAX_VISIBLE
          ? `<div style="padding-top:10px;border-top:0.5px solid var(--border);margin-top:4px">
               <a href="updates.html" style="font-size:12px;font-weight:600;color:var(--charcoal-4);text-decoration:none">← Show recent only</a>
             </div>`
          : ''
        }
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="card">
          <div class="sh"><div class="sh-title">Upcoming Decisions</div></div>
          ${p.decisions.length > 0
            ? p.decisions.map(d=>`<div class="dec-item"><div class="dec-head"><div class="dec-title">${d.title}</div>${decTag(d.status)}</div><div class="dec-due">Due ${d.due}</div><div class="dec-note">${d.note}</div></div>`).join('')
            : `<div style="font-size:13px;color:var(--charcoal-4);padding:6px 0">No open decisions at this time.</div>`
          }
        </div>
        <div class="card">
          <div class="sh"><div class="sh-title">Your Project Lead</div></div>
          <div style="display:flex;align-items:center;gap:11px;margin-bottom:13px">
            <div style="width:42px;height:42px;border-radius:50%;background:var(--green-lt);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:var(--green-deep);flex-shrink:0">${p.teamLead.split(' ').map(n=>n[0]).join('')}</div>
            <div><div style="font-size:14px;font-weight:600;color:var(--charcoal)">${p.teamLead}</div><div style="font-size:12px;color:var(--charcoal-3)">Six Arrows Construction</div></div>
          </div>
          <div class="mrow"><span class="lbl">Phone</span><span class="val" style="font-size:12px">${p.teamPhone}</span></div>
          <div class="mrow" style="border:none"><span class="lbl">Email</span><span class="val" style="font-size:12px">${p.teamEmail}</span></div>
        </div>
      </div>
    </div>
  `);
  } // end renderUpdates

  loadUpdates();
}
</script></body></html>
