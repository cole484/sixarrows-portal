<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Six Arrows Blueprint — Wave Selections</title>
<meta name="robots" content="noindex, nofollow">
<style>
/* ── Reset ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{--sage:#757f69;--sage-dk:#5a6455;--sage-lt:#c8cec2;--cream:#ebe9de;--cream-dk:#d4d1c5;--charcoal:#2e2e2e;--white:#fff;--gray:#666;--border:#e0ddd5;--bg-secondary:#f5f4ef;--bg-primary:#ffffff;--text-primary:#2e2e2e;--text-secondary:#666666;--text-danger:#cc3333;--radius:8px}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-secondary);color:var(--text-primary);min-height:100vh;padding:20px;-webkit-font-smoothing:antialiased}
@media(max-width:640px){body{padding:12px}}

/* ── Layout ── */
.app{max-width:680px;margin:0 auto}

/* ── Login ── */
.login-wrap{display:flex;flex-direction:column;align-items:center;min-height:60vh;justify-content:center;padding:2rem 0}
.login-card{width:100%;max-width:420px;background:var(--bg-primary);border:1px solid var(--border);border-radius:12px;padding:2rem;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.login-logo{font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--sage);margin-bottom:1.5rem;display:block}
.login-card h2{font-size:22px;font-weight:700;margin-bottom:6px;color:var(--text-primary)}
.login-card p{font-size:14px;color:var(--text-secondary);margin-bottom:1.5rem;line-height:1.6}
.lf{margin-bottom:12px}
.lf label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text-primary)}
.lf input{width:100%;padding:11px 14px;font-size:14px;font-family:inherit;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-primary);color:var(--text-primary);transition:border-color .15s}
.lf input:focus{outline:none;border-color:var(--sage)}
.login-btn{width:100%;padding:12px;background:var(--sage);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;transition:background .15s}
.login-btn:hover{background:var(--sage-dk)}
.lerr{font-size:13px;color:var(--text-danger);margin-top:8px;display:none}

/* ── Setup ── */
.setup-card{background:var(--bg-primary);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.setup-hd{font-size:20px;font-weight:700;margin-bottom:6px}
.setup-sub{font-size:14px;color:var(--text-secondary);margin-bottom:1.25rem;line-height:1.6}
.setup-section{margin-bottom:1.5rem}
.setup-lbl{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--sage);margin-bottom:10px;display:block}
.room-rows{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.room-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-primary);flex-wrap:wrap;transition:border-color .15s}
.room-row.has-plumbing{border-color:var(--sage)}
.room-row-name{font-size:13px;font-weight:600;flex:1;min-width:100px}
.plumb-lbl{font-size:11px;color:var(--text-secondary);white-space:nowrap}
.plumb-toggle{display:flex;gap:4px;flex-wrap:wrap}
.plumb-btn{padding:4px 9px;font-size:11px;font-weight:600;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:transparent;color:var(--text-secondary);transition:all .15s}
.plumb-btn.ab{background:#e8f0e5;color:#3a5c32;border-color:#9ab898}
.plumb-btn.ak{background:#e8eef8;color:#2a4a7a;border-color:#8aaad8}
.plumb-btn.au{background:#f0eee8;color:#5a4a2a;border-color:#c8b898}
.plumb-btn.an{background:var(--bg-secondary);color:var(--text-secondary)}
.remove-btn{background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:18px;padding:0 2px;line-height:1;transition:color .15s}
.remove-btn:hover{color:var(--text-danger)}
.add-section{display:flex;gap:8px;margin-bottom:10px}
.add-section input{flex:1;padding:9px 12px;font-size:13px;font-family:inherit;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-primary);color:var(--text-primary)}
.add-section input:focus{outline:none;border-color:var(--sage)}
.add-btn{padding:9px 16px;background:var(--sage);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.add-btn:hover{background:var(--sage-dk)}
.setup-summary{padding:10px 14px;background:var(--bg-secondary);border-radius:var(--radius);font-size:13px;color:var(--text-secondary);margin-bottom:1.25rem;border:1px solid var(--border)}
.setup-legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-secondary)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── App chrome ── */
.client-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding:10px 14px;background:var(--bg-primary);border-radius:var(--radius);font-size:13px;border:1px solid var(--border)}
.sw-btn{font-size:12px;color:var(--text-secondary);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline}
.sw-btn:hover{color:var(--sage)}
.prog-meta{display:flex;justify-content:space-between;font-size:13px;color:var(--text-secondary);margin-bottom:7px}
.prog-bg{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:1.25rem}
.prog-fill{height:100%;background:var(--sage);border-radius:3px;transition:width .3s}
.wtabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.wtab{padding:6px 14px;font-size:12px;font-weight:600;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:transparent;color:var(--text-secondary);transition:all .15s}
.wtab.active{background:var(--sage);color:#fff;border-color:var(--sage)}
.wtab.done{color:var(--sage-dk);border-color:var(--sage-lt);background:#f0f2ee}
.cnav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.cpill{padding:5px 12px;font-size:12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:transparent;color:var(--text-secondary);transition:all .15s;white-space:nowrap}
.cpill.active{background:var(--bg-secondary);color:var(--text-primary);border-color:var(--sage-lt);font-weight:600}
.cpill.done{border-color:var(--sage);color:var(--sage-dk)}
.cpill.done::before{content:"✓ "}

/* ── Form card ── */
.card{background:var(--bg-primary);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.wlbl{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--sage);margin-bottom:4px;display:block}
.ctitle{font-size:20px;font-weight:700;margin-bottom:10px}
.guidance{font-size:14px;color:var(--text-secondary);line-height:1.6;padding:11px 14px;background:var(--bg-secondary);border-radius:var(--radius);border-left:3px solid var(--sage);margin-bottom:1.25rem}
.fields{display:flex;flex-direction:column;gap:14px}
.fg{display:flex;flex-direction:column;gap:6px}
.fg>label{font-size:13px;font-weight:600;color:var(--text-primary)}
.req{color:var(--sage)}
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:7px}
.ro{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:13px;line-height:1.3;transition:all .15s;background:var(--bg-primary)}
.ro input{width:14px;height:14px;accent-color:var(--sage);cursor:pointer;flex-shrink:0}
.ro.sel{border-color:var(--sage);background:#f0f3ee}
.fg input[type=text],.fg textarea{width:100%;padding:9px 12px;font-size:14px;font-family:inherit;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-primary);color:var(--text-primary);transition:border-color .15s}
.fg input[type=text]:focus,.fg textarea:focus{outline:none;border-color:var(--sage)}
.fg textarea{resize:vertical;min-height:70px}
.dep{display:flex;flex-direction:column;gap:14px}
.dep.hidden{display:none}

/* ── Room sections ── */
.room-section{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;background:var(--bg-primary)}
.room-section:last-child{margin-bottom:0}
.rs-hd{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--bg-secondary);cursor:pointer;user-select:none;border-bottom:1px solid var(--border)}
.rs-hd-l{display:flex;flex-direction:column;gap:2px}
.rs-nm{font-size:14px;font-weight:600}
.rs-st{font-size:11px;color:var(--text-secondary)}
.rs-body{padding:14px;display:flex;flex-direction:column;gap:12px}
.rs-body.hidden{display:none}

/* ── Light types ── */
.lt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:7px}
.lt-check{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:13px;transition:all .15s;user-select:none;background:var(--bg-primary)}
.lt-check input{width:14px;height:14px;accent-color:var(--sage);cursor:pointer;flex-shrink:0}
.lt-check.checked{border-color:var(--sage);background:#f0f3ee}
.lt-check.default-on{border-style:dashed}

/* ── Fixture cards ── */
.fix-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:7px}
.fix-check{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:13px;transition:all .15s;user-select:none;background:var(--bg-primary)}
.fix-check input{width:14px;height:14px;accent-color:var(--sage);cursor:pointer;flex-shrink:0}
.fix-check.checked{border-color:var(--sage);background:#f0f3ee}
.fix-detail{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.fix-detail-hd{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--sage);padding-bottom:8px;border-bottom:1px solid var(--border)}
.fix-details-wrap{display:flex;flex-direction:column;gap:10px;margin-top:4px}

/* ── Specialty ── */
.spec-items{display:flex;flex-direction:column;gap:12px}
.spec-item{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--bg-primary)}
.spec-item-hd{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--bg-secondary);cursor:pointer;user-select:none}
.spec-item-hd-l{display:flex;align-items:center;gap:10px}
.spec-check{width:15px;height:15px;accent-color:var(--sage);cursor:pointer;flex-shrink:0}
.spec-nm{font-size:14px;font-weight:600}
.spec-sub{font-size:12px;color:var(--text-secondary)}
.spec-body{padding:14px;display:flex;flex-direction:column;gap:12px;border-top:1px solid var(--border)}
.spec-body.hidden{display:none}

/* ── Fireplace units ── */
.fp-units{display:flex;flex-direction:column;gap:12px}
.fp-unit{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
.fp-uhd{font-size:13px;font-weight:600;color:var(--sage);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.fp-ufields{display:flex;flex-direction:column;gap:10px}

/* ── Validation / buttons ── */
.val-msg{font-size:13px;color:var(--text-danger);margin-top:10px;display:none;padding:10px 14px;background:#fdf2f2;border-radius:var(--radius);border-left:3px solid var(--text-danger);font-weight:500}
.btn-row{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}
.btn{padding:10px 20px;font-size:14px;font-weight:600;border-radius:var(--radius);cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-primary);transition:all .15s}
.btn:hover{background:var(--bg-secondary)}
.btn:disabled{opacity:.35;cursor:default}
.btn-p{background:var(--sage);color:#fff;border-color:var(--sage)}
.btn-p:hover{background:var(--sage-dk)}
.btn-s{font-size:13px;color:var(--text-secondary);border:none;background:none;cursor:pointer;padding:0}
.btn-s:hover{color:var(--sage)}

/* ── Summary ── */
.sum-card{background:var(--bg-primary);border:1px solid var(--border);border-radius:12px;padding:1.5rem;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.ss{margin-bottom:1.5rem}
.ss h3{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--sage);margin-bottom:10px}
.sc{margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.sc:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.sc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sc-nm{font-size:14px;font-weight:600;cursor:pointer;color:var(--text-primary)}
.sc-nm:hover{color:var(--sage)}
.badge{display:inline-flex;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px}
.b-done{background:#e8f0e5;color:#3a5c32}
.b-pend{background:var(--bg-secondary);color:var(--text-secondary)}
.sr{display:flex;justify-content:space-between;gap:16px;padding:5px 0;font-size:13px;border-bottom:1px solid var(--border)}
.sr:last-child{border-bottom:none}
.sk2{color:var(--text-secondary)}
.sv{font-weight:600;text-align:right}
.se{color:var(--text-secondary);font-style:italic;font-weight:400}

/* Mood Board */
.mb-section{margin-bottom:1.5rem}
.mb-section-hd{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--sage);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.mb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.mb-card{background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.mb-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;cursor:pointer}
.mb-label{font-size:11px;font-weight:600;padding:5px 8px;color:var(--text-primary)}
.mb-sublabel{font-size:10px;color:var(--text-secondary);padding:0 8px 5px}
.sum-thumbs{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.sum-thumb{width:46px;height:46px;object-fit:cover;border-radius:4px;border:1px solid var(--border);cursor:pointer}
.photo-row{display:flex;gap:6px;margin-top:6px;align-items:center}
.photo-row input{flex:1;padding:6px 8px;font-size:12px;font-family:inherit;border:1px solid var(--border);border-radius:6px;background:var(--bg-primary);color:var(--text-primary)}
.photo-row input:focus{outline:none;border-color:var(--sage)}
.inspo-section{margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}
.inspo-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
</style>
</head>

<div class="app" id="app"></div>
<script>

  {id:"laundry",      name:"Laundry Room",      plumbing:"utility"},

  {id:"pantry",       name:"Pantry",            plumbing:"utility"},

const FLOOR_OPTS=["Hardwood","LVP / LVT","Carpet","Tile","Concrete","Epoxy (garage)","Undecided"];
const WAVES=[
  {label:"Wave 1",name:"Structure",cats:["fireplace","appliances","exterior_finishes"]},

];

const BATH_FIXTURES=[
  {id:"toilet",name:"Toilet"},{id:"single_sink",name:"Single Sink"},
  {id:"double_sink",name:"Double Sink"},{id:"walk_in_shower",name:"Walk-in Shower"},
  {id:"tub_shower_combo",name:"Tub/Shower Combo"},{id:"freestanding_tub",name:"Freestanding Tub"},
  {id:"bidet",name:"Bidet"},{id:"urinal",name:"Urinal"}
];
const KITCHEN_FIXTURES=[
  {id:"kitchen_sink",name:"Kitchen Sink"},{id:"pot_filler",name:"Pot Filler"},
  {id:"bar_prep_sink",name:"Bar / Prep Sink"},{id:"outdoor_kitchen_sink",name:"Outdoor Kitchen Sink"},
  {id:"wet_bar_sink",name:"Wet Bar Sink"}

const UTILITY_FIXTURES=[
  {id:"utility_sink",name:"Utility / Laundry Sink"},{id:"washer_hookup",name:"Washer Hookup"},
  {id:"hose_bibb",name:"Hose Bibb"},{id:"floor_drain",name:"Floor Drain"}
];

const FD={
  toilet:[{id:"style",label:"Style",type:"radio",opts:["Standard two-piece","One-piece","Wall-hung","Comfort height","Undecided"],req:true},{id:"product",label:"Exact product selected",type:"text",ph:"e.g. Kohler Cimarron Comfort Height K-6418-0",req:true}],
  single_sink:[{id:"type",label:"Sink type",type:"radio",opts:["Undermount","Vessel","Drop-in","Pedestal","Wall-mount","Undecided"],req:true},{id:"faucet",label:"Faucet holes",type:"radio",opts:["Single hole","3-hole widespread","Wall mount","Undecided"],req:true},{id:"sink_product",label:"Exact sink selected",type:"text",ph:"e.g. Kohler Ladena 19\" Undermount K-2805-0",req:true},{id:"faucet_product",label:"Exact faucet selected",type:"text",ph:"e.g. Kohler Artifacts Single-Hole K-72759-4-CP",req:true}],

// ── Storage — server-side via Netlify Function (cross-device) ──
// Falls back to localStorage if the function is unavailable
const _localCache = {};

function _parseKey(key) {
  // key format: sab8_{clientKey}_{suffix}
  // Suffixes are always exactly: ans, sav, fpu, spc, rms, pfx, ltx
  const match = key.match(/^sab8_(.+)_(ans|sav|fpu|spc|rms|pfx|ltx)$/);
  if (!match) return { clientKey: null, suffix: key };
  return { clientKey: match[1], suffix: match[2] };
}

async function storageGet(key) {
  const { clientKey, suffix } = _parseKey(key);
  // Check memory cache first
  if (_localCache[key] !== undefined) return Promise.resolve(_localCache[key]);
  // Try server
  if (clientKey) {
    try {
      const res = await fetch(`/.netlify/functions/selections-storage?clientKey=${clientKey}&suffix=${suffix}`);
      if (res.ok) {
        const data = await res.json();
        const val = data.data !== null && data.data !== undefined ? JSON.stringify(data.data) : null;
        if (val) _localCache[key] = val;
        return val;
      }
    } catch(e) {}
  }
  // Fallback to localStorage
  return Promise.resolve(localStorage.getItem(key));
}

async function storageSet(key, val) {
  _localCache[key] = val;
  // Write to localStorage immediately as backup
  try { localStorage.setItem(key, val); } catch(e) {}
  // Write to Supabase via Netlify function
  const { clientKey, suffix } = _parseKey(key);
  if (clientKey) {
    let retries = 0;
    while (retries < 3) {
      try {
        let parsed;
        try { parsed = JSON.parse(val); } catch(e) { parsed = val; }
        const res = await fetch(`/.netlify/functions/selections-storage?clientKey=${clientKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ suffix, data: parsed }),
        });
        if (res.ok) break; // Success
        retries++;
        await new Promise(r => setTimeout(r, 50 * retries));
      } catch(e) {
        retries++;
        if (retries < 3) await new Promise(r => setTimeout(r, 50 * retries));
      }
    }
  }
  return Promise.resolve();
}

let _persistLock=false;
async function persist(){
  while(_persistLock){await new Promise(r=>setTimeout(r,30));}
  _persistLock=true;
  // Write to localStorage immediately as backup
  try{
    localStorage.setItem(sk("ans"),JSON.stringify(ST.answers));
    localStorage.setItem(sk("sav"),JSON.stringify(ST.saved));
    localStorage.setItem(sk("fpu"),JSON.stringify(ST.fpUnits));
    localStorage.setItem(sk("spc"),JSON.stringify(ST.specSel));
    localStorage.setItem(sk("rms"),JSON.stringify(ST.rooms));
    localStorage.setItem(sk("pfx"),JSON.stringify(ST.plumbingFixtures));
    localStorage.setItem(sk("ltx"),JSON.stringify(ST.lightingTypes));
  }catch(e){}
  // Send ALL data in a single batch request to Netlify
  try{
    const batch = {
      ans: ST.answers,
      sav: ST.saved,
      fpu: ST.fpUnits,
      spc: ST.specSel,
      rms: ST.rooms,
      pfx: ST.plumbingFixtures,
      ltx: ST.lightingTypes,
    };
    const res = await fetch(`/.netlify/functions/selections-storage?clientKey=${ST.clientKey}&batch=1`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ batch }),
    });
    if(!res.ok){
      const errText = await res.text();
      console.error('Batch save failed:', res.status, errText);
      throw new Error(`Save failed (${res.status}): ${errText}`);
    }
    const result = await res.json();
    console.log('Batch save OK:', result);
    if(result.failed && result.failed.length > 0){
      console.error('Some suffixes failed:', result.failed);
      throw new Error(`Partial save failure: ${result.failed.map(f=>f.suffix).join(', ')}`);
    }
    return result;
  }catch(e){
    console.error('persist error:', e.message);
    throw e; // Re-throw so saveProgress can show failure
  }finally{
    _persistLock=false;
  }
}

  if(ST.catId==="fireplace"){

    if(!want)return{ok:false,msg:"Please answer the fireplace question before continuing."};
    if(want==="No — no fireplace")return{ok:true};
    const cnt=parseInt(ST.answers["fireplace_fp_count"]||"0");
    if(!cnt)return{ok:false,msg:"Please select how many fireplaces."};
    const ords=["First","Second","Third","Fourth"];
    for(let i=0;i<ST.fpUnits.length;i++){
      const u=ST.fpUnits[i];
      if(!u.type)return{ok:false,msg:`Please select a fuel type for the ${ords[i]} fireplace.`};
      if(!u.size)return{ok:false,msg:`Please select a size for the ${ords[i]} fireplace.`};
      if(!u.location||!u.location.trim())return{ok:false,msg:`Please enter a location for the ${ords[i]} fireplace.`};
    }
    return{ok:true};
  }
  // ── APPLIANCES ─────────────────────────────────────────────────────────────
  if(ST.catId==="appliances"){
    var appReq=[
      ['app_range_type','range type'],['app_range_size','range size'],['app_range_product','exact range product'],
      ['app_hood_type','hood type'],['app_hood_vent','hood venting'],['app_hood_product','exact hood product'],
      ['app_fridge_type','refrigerator type'],['app_fridge_size','refrigerator width'],['app_fridge_product','exact refrigerator product'],
      ['app_dish_type','dishwasher type'],['app_dish_product','exact dishwasher product'],
      ['app_micro_type','microwave type'],['app_micro_product','exact microwave product']
    ];
    for(var _i=0;_i<appReq.length;_i++){var ar=appReq[_i];if(!(ST.answers[ar[0]]||'').trim())return{ok:false,msg:'Please complete the '+ar[1]+' field.'};}
    var ADD_IDS=['wine_fridge','bev_fridge','warming_draw','steam_oven','speed_oven','coffee_sys','ice_maker','trash_comp','second_dish','outdoor_grill','outdoor_fridge','outdoor_pizza','wine_tower','keg_fridge'];

        if(!(ST.answers['app_add_prod_'+aid]||'').trim())return{ok:false,msg:'Please enter the exact product for the selected additional appliance.'};
      }

  }
  // ── EXTERIOR FINISHES ──────────────────────────────────────────────────────
  if(ST.catId==="exterior_finishes"){
    if(!(ST.answers['ext_roof_type']||'').trim())return{ok:false,msg:'Please select a roof type.'};
    if(!(ST.answers['ext_roof_color']||'').trim())return{ok:false,msg:'Please enter a roof color.'};

    if(!(ST.answers['ext_soffit_type']||'').trim())return{ok:false,msg:'Please select a soffit type.'};
    if(!(ST.answers['ext_soffit_vent']||'').trim())return{ok:false,msg:'Please select vented or non-vented soffit.'};
    if(!(ST.answers['ext_soffit_color']||'').trim())return{ok:false,msg:'Please enter a soffit color.'};
    if(!(ST.answers['ext_gutter_type']||'').trim())return{ok:false,msg:'Please select a gutter style.'};
    if(!(ST.answers['ext_gutter_material']||'').trim())return{ok:false,msg:'Please select a gutter material.'};
    if(!(ST.answers['ext_gutter_color']||'').trim())return{ok:false,msg:'Please enter a gutter color.'};
    return{ok:true};
  }
  // ── SPECIALTY TRIM ─────────────────────────────────────────────────────────
  if(ST.catId==="specialty_trim"){
    const sel=ST.specSel||{};
    if(Object.values(sel).some(v=>v)){
      for(const item of SPEC_ITEMS){
        if(sel[item.id]){
          for(const f of item.fields){
            if(!f.req)continue;
            const v=ST.answers[`specialty_trim_${f.id}`]||"";
            if(!v.trim())return{ok:false,msg:`Please complete "${f.label}" for ${item.name}.`};
          }
        }
      }
    }
    return{ok:true};
  }
  // ── FLOORING ───────────────────────────────────────────────────────────────
  if(ST.catId==="flooring"){
    for(var _k=0;_k<ST.rooms.length;_k++){var r=ST.rooms[_k];
      if(!ST.answers['flooring_floor_'+r.id])return{ok:false,msg:'Please select flooring type for '+r.name+'.'};
      if(!(ST.answers['flooring_color_'+r.id]||'').trim())return{ok:false,msg:'Please enter color direction for '+r.name+'.'};
      if(!(ST.answers['flooring_product_'+r.id]||'').trim())return{ok:false,msg:'Please enter exact product for '+r.name+'.'};
    }
    return{ok:true};
  }
  // ── TILE ───────────────────────────────────────────────────────────────────
  if(ST.catId==="tile"){
    const baths=ST.rooms.filter(r=>r.plumbing==="bath");
    for(const b of baths){
      if(!(ST.answers[`tile_floor_${b.id}`]||"").trim())return{ok:false,msg:`Please enter floor tile for ${b.name}.`};
      if(!(ST.answers[`tile_floor_product_${b.id}`]||"").trim())return{ok:false,msg:`Please enter floor tile product for ${b.name}.`};
      if(!(ST.answers[`tile_shower_${b.id}`]||"").trim())return{ok:false,msg:`Please enter shower wall tile for ${b.name}.`};
      if(!(ST.answers[`tile_shower_product_${b.id}`]||"").trim())return{ok:false,msg:`Please enter shower wall tile product for ${b.name}.`};
    }
    return{ok:true};
  }
  // ── PLUMBING ───────────────────────────────────────────────────────────────
  if(ST.catId==="plumbing"){
    const plumbRooms=ST.rooms.filter(r=>r.plumbing!=="none");
    for(const r of plumbRooms){
      if(countRoomFixtures(r.id)===0)return{ok:false,msg:`Please select at least one fixture for ${r.name}.`};
      const fixtures=getFixturesForType(r.plumbing);
      for(const fix of fixtures){
        if(!isFixtureSel(r.id,fix.id))continue;
        const defs=FD[fix.id]||[];
        for(const d of defs){if(!d.req)continue;const v=getFA(r.id,fix.id,d.id);if(!v.trim())return{ok:false,msg:`Please complete "${d.label}" for ${fix.name} in ${r.name}.`};}
      }
    }
    return{ok:true};
  }
  // ── LIGHTING ───────────────────────────────────────────────────────────────
  if(ST.catId==="lighting"){
    for(const r of ST.rooms){
      if(countRoomLights(r.id)===0)return{ok:false,msg:`Please select at least one light type for ${r.name}.`};
      const sel=ST.lightingTypes[r.id]||{};
      for(const lt of LIGHT_TYPES){if(!sel[lt.id])continue;const v=getLightProduct(r.id,lt.id);if(!v.trim())return{ok:false,msg:`Please enter the exact fixture for ${lt.name} in ${r.name}.`};}
    }
    return{ok:true};
  }
  // ── COUNTERTOPS ────────────────────────────────────────────────────────────
  if(ST.catId==="countertops"){
    const cat=CATS[ST.catId];
    if(cat&&cat.fields){for(const f of cat.fields){if(!f.req)continue;const v=(ST.answers['countertops_'+f.id]||ST.answers[f.id]||"");if(!v.trim())return{ok:false,msg:`Please complete "${f.label}" before continuing.`};}}
    const baths=ST.rooms.filter(r=>r.plumbing==="bath");
    for(const b of baths){
      if(!(ST.answers[`ct_bath_${b.id}`]||"").trim())return{ok:false,msg:`Please select a vanity countertop material for ${b.name}.`};
      if(ST.answers[`ct_bath_${b.id}`]==="Other"&&!(ST.answers[`ct_bath_other_${b.id}`]||"").trim())return{ok:false,msg:`Please specify the countertop material for ${b.name}.`};
      if(!(ST.answers[`ct_bath_product_${b.id}`]||"").trim())return{ok:false,msg:`Please enter the exact vanity countertop product for ${b.name}.`};
    }
    return{ok:true};
  }
  // ── PAINT ──────────────────────────────────────────────────────────────────
  if(ST.catId==="paint"){
    if(!(ST.answers['paint_sheen_walls']||'').trim())return{ok:false,msg:'Please select a sheen for all walls.'};
    if(!(ST.answers['paint_sheen_trim']||'').trim())return{ok:false,msg:'Please select a sheen for all trim.'};
    if(!(ST.answers['paint_sheen_ceilings']||'').trim())return{ok:false,msg:'Please select a sheen for all ceilings.'};
    for(var _p=0;_p<ST.rooms.length;_p++){var rp=ST.rooms[_p];
      if(!(ST.answers['paint_int_wall_'+rp.id]||'').trim())return{ok:false,msg:'Please enter a wall color for '+rp.name+'.'};
      if(!(ST.answers['paint_int_trim_'+rp.id]||'').trim())return{ok:false,msg:'Please enter a trim color for '+rp.name+'.'};
      if(!(ST.answers['paint_int_ceil_'+rp.id]||'').trim())return{ok:false,msg:'Please enter a ceiling color for '+rp.name+'.'};
    }
    if(!(ST.answers['paint_porch_ceil_type']||'').trim())return{ok:false,msg:'Please select Paint or Stain for porch ceiling.'};
    if(!(ST.answers['paint_porch_ceil_color']||'').trim())return{ok:false,msg:'Please enter a porch ceiling color.'};
    if(!(ST.answers['paint_porch_post_type']||'').trim())return{ok:false,msg:'Please select Paint or Stain for porch posts.'};
    if(!(ST.answers['paint_porch_post_color']||'').trim())return{ok:false,msg:'Please enter a porch post color.'};
    return{ok:true};
  }
  // ── DOORS ──────────────────────────────────────────────────────────────────
  const cat=CATS[ST.catId];
  if(cat&&cat.fields){
    for(const f of cat.fields){
      if(!f.req)continue;
      const v=(ST.answers[ST.catId+'_'+f.id]||ST.answers[f.id]||"");
      if(!v.trim())return{ok:false,msg:`Please complete "${f.label}" before continuing.`};
    }
  }
  return{ok:true};
}

async function saveProgress(btn){
  const orig=btn.textContent;
  btn.textContent='Saving...';
  btn.disabled=true;
  try {
    await persist();
    btn.textContent='Saved ✓';
    btn.style.color='var(--sage)';
  } catch(e) {
    btn.textContent='Save failed — check console';
    btn.style.color='var(--danger)';
    console.error('saveProgress error:', e.message);
  }
  setTimeout(()=>{btn.textContent=orig;btn.style.color='';btn.disabled=false;},3000);
}

async function advance(){
  const v=validate();if(!v.ok){showMsg(v.msg);return}
  ST.saved[ST.catId]=true;
  const btn=document.querySelector('.btn-p');
  if(btn){const orig=btn.textContent;btn.textContent='Saving...';btn.disabled=true;
    try {
      await persist();
      btn.textContent=orig;btn.disabled=false;
    } catch(e) {
      btn.textContent='Save failed!';btn.disabled=false;
      btn.style.color='var(--danger)';
      showMsg('Could not save to server. Check your connection and try again.');
      setTimeout(()=>{btn.textContent=orig;btn.style.color='';},3000);
      return; // Don't advance if save failed
    }
  } else {
    try { await persist(); } catch(e) { console.error('advance persist failed:', e.message); }
  }
  const idx=ALL_IDS.indexOf(ST.catId);
  if(idx<ALL_IDS.length-1){const nid=ALL_IDS[idx+1];ST.catId=nid;ST.wave=CATS[nid].wave;}
  else ST.view="summary";
  render();
}
function goBack(){
  const idx=ALL_IDS.indexOf(ST.catId);
  if(idx>0){const pid=ALL_IDS[idx-1];ST.catId=pid;ST.wave=CATS[pid].wave;}
  else ST.screen="setup";
  render();
}
function showMsg(msg){
  const el=document.getElementById("val-msg");if(!el)return;
  el.textContent=msg;el.style.display="block";
  setTimeout(()=>el.style.display="none",5000);
}

function pickR(fid,val,el){val=decVal(val);
  const current=ga(fid);
  if(current===val){
    // Check if this field is required — if so, don't allow deselect
    const cat=CATS[ST.catId];
    const field=cat&&cat.fields&&cat.fields.find(f=>f.id===fid);
    if(field&&field.req){
      // Required field — can't deselect, just return
      return;
    }
    // Optional field — allow deselect
    sa(fid,"");
    el.querySelector("input").checked=false;
    el.classList.remove("sel");
    return;
  }
  sa(fid,val);
  el.closest(".rg").querySelectorAll(".ro").forEach(o=>o.classList.remove("sel"));
  el.classList.add("sel");el.querySelector("input").checked=true;
  if(ST.catId==="fireplace"){
    if(fid==="fp_want"){const dep=document.getElementById("fp-dep");if(dep)dep.className="dep"+(val==="No — no fireplace"?" hidden":"");}
    if(fid==="fp_count"){const n=parseInt(val)||0;ST.answers["fireplace_fp_count"]=String(n);ST.fpUnits=Array.from({length:n},(_,i)=>ST.fpUnits[i]||{type:"",size:"",location:""});renderFpUnits();const ns=document.getElementById("fp-notes-wrap");if(ns)ns.style.display=n>0?"":"none";}
  }
}

}

function rfPlumbing(){
  const rooms=plumbingRooms();
  if(!rooms.length)return`<div style="padding:1rem;background:var(--bg-secondary);border-radius:var(--radius);font-size:14px;color:var(--text-secondary)">No plumbing rooms set up. Go back to Project Setup and assign plumbing types to your rooms.</div>`;
  return rooms.map(r=>{
    const fixtures=getFixturesForType(r.plumbing);
    const cnt=countRoomFixtures(r.id);
    const isOpen=ST.roomOpen[r.id]!==false;
    const typeLbl=r.plumbing==="bath"?"Bath":r.plumbing==="kitchen"?"Kitchen":"Utility";
    const fixChecks=fixtures.map(f=>{const sel=isFixtureSel(r.id,f.id);return`<label class="fix-check${sel?" checked":""}" onclick="this.querySelector('input').click()"><input type="checkbox" ${sel?"checked":""} onclick="event.stopPropagation();toggleFixture('${r.id}','${f.id}',this)">${f.name}</label>`;}).join("");
    const detailSections=fixtures.filter(f=>isFixtureSel(r.id,f.id)).map(f=>{
      const defs=FD[f.id]||[];
      const fields=defs.map(d=>{const val=getFA(r.id,f.id,d.id);
        if(d.type==="radio"){const opts=d.opts.map(o=>`<label class="ro${val===o?" sel":""}" onclick="pickFD('${r.id}','${f.id}','${d.id}','${o.replace(/'/g,'&#39;').replace(/"/g,'&#34;')}',this)"><input type="radio" name="pfd_${r.id}_${f.id}_${d.id}" ${val===o?"checked":""}>${o}</label>`).join("");return`<div class="fg"><label>${d.label}${d.req?` <span class="req">*</span>`:""}</label><div class="rg">${opts}</div></div>`;}
        return`<div class="fg"><label>${d.label}${d.req?` <span class="req">*</span>`:""}</label><input type="text" value="${val.replace(/"/g,'&quot;')}" placeholder="${(d.ph||"").replace(/"/g,'&quot;')}" onchange="setFA('${r.id}','${f.id}','${d.id}',this.value)" onkeyup="setFA('${r.id}','${f.id}','${d.id}',this.value)"></div>`;
      }).join("");
      return`<div class="fix-detail"><div class="fix-detail-hd">${f.name}</div>${fields}</div>`;
    }).join("");
    return`<div class="room-section"><div class="rs-hd" onclick="ST.roomOpen['${r.id}']=!ST.roomOpen['${r.id}'];render()">
      <div class="rs-hd-l"><div class="rs-nm">${r.name}</div><div class="rs-st">${typeLbl} plumbing · ${cnt?cnt+" fixture"+(cnt!==1?"s":"")+" selected":"No fixtures selected yet"}</div></div>
      <span style="font-size:12px;color:var(--text-secondary)">${isOpen?"▲":"▼"}</span>

      ${detailSections?`<div class="fix-details-wrap">${detailSections}</div>`:""}
      <div class="fg"><label>Room notes</label><input type="text" value="${(ST.answers[`plumbing_${r.id}_notes`]||"").replace(/"/g,'&quot;')}" placeholder="Any special plumbing notes..." onchange="ST.answers['plumbing_${r.id}_notes']=this.value" onkeyup="ST.answers['plumbing_${r.id}_notes']=this.value"></div>
    </div></div>`;
  }).join("");
}
function rfLighting(){
  if(!ST.rooms.length)return'<div style="padding:1rem;background:var(--bg-secondary);border-radius:var(--radius);font-size:14px;color:var(--text-secondary)">No rooms set up. Go back to Project Setup first.</div>';
  return ST.rooms.map(function(r){
    initRoomLights(r.id);
    var cnt=countRoomLights(r.id);
    var isOpen=ST.roomOpen['lt_'+r.id]!==false;
    var sel=ST.lightingTypes[r.id]||{};
    var ltChecks=LIGHT_TYPES.map(function(lt){
      var checked=!!sel[lt.id];
      var typLabel=lt.defaultOn?'<span style="font-size:10px;color:var(--sage);margin-left:3px">typical</span>':'';
      return '<label class="lt-check'+(checked?' checked':'')+(lt.defaultOn?' default-on':'')+'" onclick="this.querySelector(\'input\').click()">'
        +'<input type="checkbox" '+(checked?'checked':'')+' onclick="event.stopPropagation();toggleLight(\''+r.id+'\',\''+lt.id+'\',this)">'
        +lt.name+typLabel+'</label>';
    }).join('');
    var productInputs=LIGHT_TYPES.filter(function(lt){return sel[lt.id];}).map(function(lt){
      var rawProd=getLightProduct(r.id,lt.id);
      if(lt.id==='recessed'&&!rawProd){
        rawProd='6" LED Recessed Light (e.g. Halo H6ICAT, 3000K)';
        setLightProduct(r.id,lt.id,rawProd);
      }
      var prod=(rawProd||'').replace(/"/g,'&quot;');
      return '<div class="fix-detail"><div class="fix-detail-hd">'+lt.name+'</div>'
        +'<div class="fg"><label>Exact fixture selected <span class="req">*</span></label>'
        +'<input type="text" value="'+prod+'" placeholder="'+lt.ph+'" '
        +'onchange="setLightProduct(\''+r.id+'\',\''+lt.id+'\',this.value)" '
        +'onkeyup="setLightProduct(\''+r.id+'\',\''+lt.id+'\',this.value)">'
        +'<div class="fg"><label>Fixture photo URL</label>'+photoInput('lighting_'+r.id+'_'+lt.id,'Paste product photo link...')+'</div>'
        +'</div></div>';
    }).join('');
    var notesVal=(ST.answers['lighting_'+r.id+'_notes']||'').replace(/"/g,'&quot;');
    var body='<div class="fg"><label>Which light types are going in this room? <span class="req">*</span></label>'
      +'<div style="font-size:12px;color:var(--text-secondary);margin-bottom:6px">Recessed lights are pre-selected — uncheck if this room won\'t have them.</div></div>'
      +'<div class="lt-grid">'+ltChecks+'</div>'
      +(productInputs?'<div class="fix-details-wrap">'+productInputs+'</div>':'')
      +'<div class="fg" style="margin-top:4px"><label>Lighting notes for this room</label>'
      +'<input type="text" value="'+notesVal+'" placeholder="Dimmer switch, smart controls, placement notes..." '
      +'onchange="ST.answers[\'lighting_'+r.id+'_notes\']=this.value" '
      +'onkeyup="ST.answers[\'lighting_'+r.id+'_notes\']=this.value">'
      +'</div>';
    return '<div class="room-section">'
      +'<div class="rs-hd" onclick="ST.roomOpen[\'lt_'+r.id+'\']=!ST.roomOpen[\'lt_'+r.id+'\'];render()">'
      +'<div class="rs-hd-l"><div class="rs-nm">'+r.name+'</div>'
      +'<div class="rs-st">'+(cnt?cnt+' light type'+(cnt!==1?'s':'')+' selected':'No light types selected yet')+'</div></div>'
      +'<span style="font-size:12px;color:var(--text-secondary)">'+(isOpen?'▲':'▼')+'</span></div>'
      +'<div class="rs-body'+(isOpen?'':' hidden')+'">'+body+'</div></div>';

function rfCountertops(){
  const cat=CATS[ST.catId];
  const baths=ST.rooms.filter(r=>r.plumbing==="bath");
  // Render standard fields (excluding bath vanity — handled per room below)
  let html=cat.fields.map(f=>{const val=ga(f.id);
    if(f.type==="radio"){const opts=f.opts.map((o,oi)=>`<label class="ro${val===o?" sel":""}" onclick="pickRIdx('${f.id}',${oi},this)"><input type="radio" name="${f.id}" ${val===o?"checked":""}>${o}</label>`).join("");return`<div class="fg"><label>${f.label}${(f.req&&!val)?` <span class="req">*</span>`:""}</label><div class="rg">${opts}</div></div>`;}
    if(f.type==="textarea")return`<div class="fg"><label>${f.label}${(f.req&&!val)?` <span class="req">*</span>`:""}</label><textarea placeholder="${f.ph||""}" onchange="sa('${f.id}',this.value)" onkeyup="sa('${f.id}',this.value)">${val}</textarea></div>`;
    return`<div class="fg"><label>${f.label}${(f.req&&!val)?` <span class="req">*</span>`:""}</label><input type="text" value="${val.replace(/"/g,'&quot;')}" placeholder="${(f.ph||"").replace(/"/g,'&quot;')}" onchange="sa('${f.id}',this.value)" onkeyup="sa('${f.id}',this.value)"></div>`;
  }).join("");
  // Per-bathroom vanity countertop section
  if(baths.length){
    const bathRows=baths.map(b=>{
      const bval=ST.answers[`ct_bath_${b.id}`]||"";
      const opts=BATH_CT_OPTS.map((o,oi)=>`<label class="ro${bval===o?" sel":""}" onclick="setBathCt('${b.id}',${oi},this)"><input type="radio" name="ctb_${b.id}" ${bval===o?"checked":""}>${o}</label>`).join("");
      const bprod=ST.answers[`ct_bath_product_${b.id}`]||"";

      return`<div class="room-section"><div class="rs-hd" style="cursor:default"><div class="rs-nm">${b.name} — Vanity Countertop</div></div>
        <div class="rs-body">
          <div class="fg"><label>Countertop material <span class="req">*</span></label><div class="rg">${opts}</div></div>
          ${bval==="Other"?`<div class="fg"><label>Specify material <span class="req">*</span></label><input type="text" value="${bother.replace(/"/g,'&quot;')}" placeholder="Describe material..." onchange="ST.answers['ct_bath_other_${b.id}']=this.value" onkeyup="ST.answers['ct_bath_other_${b.id}']=this.value"></div>`:""}
          <div class="fg"><label>Exact product selected <span class="req">*</span></label><input type="text" value="${bprod.replace(/"/g,'&quot;')}" placeholder="e.g. Cambria Torquay 3CM slab" onchange="ST.answers['ct_bath_product_${b.id}']=this.value" onkeyup="ST.answers['ct_bath_product_${b.id}']=this.value"></div>
        </div></div>`;
    }).join("");
    html+=`<div style="margin-top:14px"><div style="font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--sage);margin-bottom:10px">Bath Vanity Countertops — Per Room</div>${bathRows}</div>`;
  } else {
    html+=`<div style="margin-top:14px;padding:12px;background:var(--bg-secondary);border-radius:var(--radius);font-size:13px;color:var(--text-secondary)">No bathrooms set up. Go back to Project Setup and assign plumbing type "Bath" to your bathroom rooms.</div>`;
  }
  return html;
}

      +'onchange="paintExtSurfaceColor('+i+',this.value)" onkeyup="paintExtSurfaceColor('+i+',this.value)"></div>'

      +'</div>';
  }).join('');

  var exteriorSection='<div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border)">'
    +'<div style="font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--sage);margin-bottom:14px">Exterior Paint & Stain</div>'

    +'onchange="ST.answers[\'paint_porch_ceil_color\']=this.value" onkeyup="ST.answers[\'paint_porch_ceil_color\']=this.value">'
    +'</div></div></div>'
    // Porch posts
    +'<div class="room-section" style="margin-bottom:10px">'

    +'<div class="rg" style="grid-template-columns:1fr 1fr">'+extTypeOpts('paint_porch_post_type','porch_post_type')+'</div></div>'
    +'<div class="fg"><label>Color / product <span class="req">*</span></label>'
    +'<input type="text" value="'+porchPostColor+'" placeholder="e.g. SW Extra White, or match trim color..." '

function rfStandard(){
  const cat=CATS[ST.catId];
  return cat.fields.map(f=>{const val=ga(f.id);
    const reqMark=f.req&&!val?` <span class="req">*</span>`:"";
    if(f.type==="radio"){
      // Use data-fid and data-val attributes to avoid quote-in-JS-string bugs
      const opts=f.opts.map(o=>`<label class="ro${val===o?" sel":""}" data-fid="${f.id}" data-val="${o.replace(/"/g,'&quot;')}" onclick="pickRData(this)"><input type="radio" name="${f.id}" ${val===o?"checked":""}>${o}</label>`).join("");
      return`<div class="fg"><label>${f.label}${reqMark}</label><div class="rg">${opts}</div></div>`;
    }
    if(f.type==="textarea")return`<div class="fg"><label>${f.label}${reqMark}</label><textarea placeholder="${f.ph||""}" onchange="sa('${f.id}',this.value)" onkeyup="sa('${f.id}',this.value)">${val}</textarea></div>`;
    return`<div class="fg"><label>${f.label}${reqMark}</label><input type="text" value="${val.replace(/"/g,'&quot;')}" placeholder="${(f.ph||"").replace(/"/g,'&quot;')}" onchange="sa('${f.id}',this.value)" onkeyup="sa('${f.id}',this.value)"></div>`;
  }).join("");
}

// pickRData: reads fid/val from data attributes — safe for values containing quotes
function pickRData(el){
  const fid=el.getAttribute('data-fid');
  const val=el.getAttribute('data-val');
  pickR(fid,val,el);
}
function toggleFixture(rid,fid,el){setFixture(rid,fid,el.checked);el.closest(".fix-check").className="fix-check"+(el.checked?" checked":"");render();}
function toggleLight(rid,ltid,el){setLight(rid,ltid,el.checked);const lt=LIGHT_TYPES.find(l=>l.id===ltid);el.closest(".lt-check").className="lt-check"+(el.checked?" checked":"")+(lt&&lt.defaultOn?" default-on":"");render();}

function renderForm(){
  const cat=CATS[ST.catId];const wv=WAVES[cat.wave];
  const isFirst=ALL_IDS.indexOf(ST.catId)===0;const isLast=ALL_IDS.indexOf(ST.catId)===ALL_IDS.length-1;
  let body="";
  if(cat.type==="fireplace")body=rfFireplace();
  else if(cat.type==="specialty")body=rfSpecialty();
  else if(cat.type==="flooring")body=rfFlooring();
  else if(cat.type==="tile")body=rfTile();
  else if(cat.type==="plumbing")body=rfPlumbing();
  else if(cat.type==="lighting")body=rfLighting();
  else if(cat.type==="appliances")body=rfAppliances();
  else if(cat.type==="exterior_finishes")body=rfExteriorFinishes();
  else if(cat.type==="countertops")body=rfCountertops();
  else if(cat.type==="paint")body=rfPaint();
  else body=rfStandard();
  const INSPO_CATS=['flooring','tile','plumbing','lighting','countertops','paint','exterior_finishes'];
  const inspoHtml=INSPO_CATS.includes(ST.catId)?inspoSection(ST.catId):'';
  return`<div class="card"><span class="wlbl">${wv.label} — ${wv.name}</span><div class="ctitle">${cat.name}</div><div class="guidance">${cat.guidance}</div><div class="fields">${body}</div>${inspoHtml}
    <div id="val-msg" class="val-msg"></div>
    <div class="btn-row"><button class="btn" onclick="goBack()">${isFirst?"← Setup":"Back"}</button><button class="btn-s" id="save-prog-btn" onclick="saveProgress(this)">Save progress</button><button class="btn btn-p" onclick="advance()">${isLast?"View Summary →":"Save & Continue →"}</button></div>
  </div>`;
}

function renderSummary(){
  // Helper: one summary row
  function srow(label, val){
    if(!val||val==='')return '';
    return '<div class="sr"><span class="sk2">'+label+'</span><span class="sv">'+val+'</span></div>';
  }
  function srow_req(label, val){
    var empty=!val||val==='';
    return '<div class="sr"><span class="sk2">'+label+'</span><span class="sv '+(empty?'se':'')+'">'+(val||'— not entered —')+'</span></div>';
  }
  
  function shead(label){
    return '<div style="font-size:11px;font-weight:600;color:var(--sage);letter-spacing:.1em;text-transform:uppercase;margin:10px 0 6px;padding-top:8px;border-top:1px solid var(--border)">'+label+'</div>';
  }

  var secs=WAVES.map(function(w,wi){
    var cats=ALL_IDS.filter(function(id){return CATS[id].wave===wi;});
    var rows=cats.map(function(id){
      var cat=CATS[id];
      var d=isSaved(id),skipped=isSkipped(id);
      var badge=d?'<span class="badge b-done">Complete</span>':skipped?'<span class="badge b-done">Skipped</span>':'<span class="badge b-pend">Pending</span>';
      var preview='';

      // ── FIREPLACE ──────────────────────────────────────────────────────
      if(id==='fireplace'){
        var want=ST.answers['fireplace_fp_want']||'';
        preview+=srow_req('Fireplace?', want);
        if(ST.fpUnits&&ST.fpUnits.length){
          ST.fpUnits.forEach(function(u,i){
            preview+=srow_req('Fireplace '+(i+1), u.type&&u.size&&u.location?(u.type+', '+u.size+' — '+u.location):(u.type||'Incomplete'));
          });
        }
        preview+=srow('Notes', ST.answers['fireplace_fp_notes']||'');
      }

      // ── APPLIANCES ─────────────────────────────────────────────────────
      else if(id==='appliances'){
        // One compact row per standard appliance — type + product combined
        [
          ['Range / Cooktop','app_range_type','app_range_product'],
          ['Range Hood','app_hood_type','app_hood_product'],
          ['Refrigerator','app_fridge_type','app_fridge_product'],
          ['Dishwasher','app_dish_type','app_dish_product'],
          ['Microwave','app_micro_type','app_micro_product']
        ].forEach(function(r){
          var t=ST.answers[r[1]]||'';
          var p=ST.answers[r[2]]||'';
          var val=t&&p?(t+' — '+p):t||p||'';
          preview+=srow_req(r[0],val);
        });
        // Additional checked appliances
        var ADD_OPTS_SUM=[
          {id:'wine_fridge',  name:'Wine Refrigerator'},
          {id:'bev_fridge',   name:'Beverage Refrigerator'},
          {id:'warming_draw', name:'Warming Drawer'},
          {id:'steam_oven',   name:'Steam Oven'},
          {id:'speed_oven',   name:'Speed Oven / Combi'},
          {id:'coffee_sys',   name:'Built-in Coffee System'},
          {id:'ice_maker',    name:'Ice Maker'},
          {id:'trash_comp',   name:'Trash Compactor'},
          {id:'second_dish',  name:'Second Dishwasher'},
          {id:'outdoor_grill',name:'Outdoor Grill'},
          {id:'outdoor_fridge',name:'Outdoor Refrigerator'},
          {id:'outdoor_pizza',name:'Outdoor Pizza Oven'},
          {id:'wine_tower',   name:'Wine Tower / Column'},
          {id:'keg_fridge',   name:'Keg / Draft Beer System'}
        ];
        var hasAdditional=false;
        ADD_OPTS_SUM.forEach(function(a){
          if(ST.answers['app_add_sel_'+a.id]){
            if(!hasAdditional){preview+=shead('Additional Appliances');hasAdditional=true;}
            var prod=ST.answers['app_add_prod_'+a.id]||'';
            var loc=ST.answers['app_add_loc_'+a.id]||'';
            preview+=srow_req(a.name, prod+(loc?' ('+loc+')':''));
          }
        });
        // Custom appliances
        var customs=[];try{customs=JSON.parse(ST.answers['app_custom']||'[]');}catch(e){}
        if(customs.length){
          if(!hasAdditional)preview+=shead('Additional Appliances');
          customs.forEach(function(c){if(c.name||c.product)preview+=srow_req(c.name||'Custom appliance',c.product||'');});
        }
      }

      // ── EXTERIOR FINISHES ──────────────────────────────────────────────
      else if(id==='exterior_finishes'){
        preview+=shead('Roof');
        preview+=srow_req('Type', ST.answers['ext_roof_type']||'');
        preview+=srow_req('Color', ST.answers['ext_roof_color']||'');
        preview+=srow_req('Product', ST.answers['ext_roof_product']||'');
        preview+=srow('Notes', ST.answers['ext_roof_notes']||'');
        preview+=shead('Soffit');
        preview+=srow_req('Type', ST.answers['ext_soffit_type']||'');
        preview+=srow_req('Vented?', ST.answers['ext_soffit_vent']||'');
        preview+=srow_req('Color', ST.answers['ext_soffit_color']||'');
        preview+=shead('Gutters');
        preview+=srow_req('Style', ST.answers['ext_gutter_type']||'');
        preview+=srow_req('Material', ST.answers['ext_gutter_material']||'');
        preview+=srow_req('Color', ST.answers['ext_gutter_color']||'');
        preview+=srow('Notes', ST.answers['ext_gutter_notes']||'');
      }

      // ── SPECIALTY TRIM ─────────────────────────────────────────────────
      else if(id==='specialty_trim'){
        var sel=ST.specSel||{};
        var chosen=SPEC_ITEMS.filter(function(it){return sel[it.id];});
        if(!chosen.length){
          preview+=srow_req('Items selected','None');
        } else {
          chosen.forEach(function(it){
            var locField=it.fields[0];
            var loc=locField?ST.answers['specialty_trim_'+locField.id]||'':'';
            preview+=srow_req(it.name, loc||'Selected');
          });
        }
      }

      // ── FLOORING ───────────────────────────────────────────────────────
      else if(id==='flooring'){
        var fThumbs='';
        ST.rooms.forEach(function(r){
          var type=ST.answers['flooring_floor_'+r.id]||'';
          var color=ST.answers['flooring_color_'+r.id]||'';
          var prod=ST.answers['flooring_product_'+r.id]||'';
          preview+=srow_req(r.name, type+(color?' — '+color:'')+(prod?' ('+prod+')':''));
          var ph=getPhoto('flooring_product_'+r.id);
          if(ph)fThumbs+=sumThumbImg(ph,r.name);
        });
        if(fThumbs)preview+='<div class="sum-thumbs">'+fThumbs+'</div>';
      }

      // ── TILE ───────────────────────────────────────────────────────────
      else if(id==='tile'){
        bathRooms().forEach(function(b){
          preview+=shead(b.name);
          preview+=srow_req('Floor tile', ST.answers['tile_floor_'+b.id]||'');
          preview+=srow_req('Floor product', ST.answers['tile_floor_product_'+b.id]||'');
          preview+=srow_req('Shower wall tile', ST.answers['tile_shower_'+b.id]||'');
          preview+=srow_req('Shower product', ST.answers['tile_shower_product_'+b.id]||'');
          preview+=srow('Accent tile', ST.answers['tile_accent_'+b.id]||'');
          preview+=srow('Heated floor', ST.answers['tile_heat_'+b.id]||'');
        });
      }

      // ── PLUMBING ───────────────────────────────────────────────────────
      else if(id==='plumbing'){
        plumbingRooms().forEach(function(r){
          var fixtures=getFixturesForType(r.plumbing);
          var selFix=fixtures.filter(function(f){return isFixtureSel(r.id,f.id);});
          if(!selFix.length){preview+=srow_req(r.name,'No fixtures selected');return;}
          preview+=shead(r.name);
          selFix.forEach(function(f){
            var prod=getFA(r.id,f.id,'product')||getFA(r.id,f.id,'sink_product')||'';
            var faucetProd=getFA(r.id,f.id,'faucet_product')||'';
            preview+=srow_req(f.name+' — product', prod);
            if(faucetProd)preview+=srow_req(f.name+' — faucet', faucetProd);
          });
        });
      }

      // ── LIGHTING ───────────────────────────────────────────────────────
      else if(id==='lighting'){
        ST.rooms.forEach(function(r){
          var sel=ST.lightingTypes[r.id]||{};
          var selTypes=LIGHT_TYPES.filter(function(lt){return sel[lt.id];});
          if(!selTypes.length){preview+=srow_req(r.name,'No light types selected');return;}
          preview+=shead(r.name);
          selTypes.forEach(function(lt){
            var prod=getLightProduct(r.id,lt.id)||'';
            preview+=srow_req(lt.name, prod);
          });
          preview+=srow('Notes', ST.answers['lighting_'+r.id+'_notes']||'');
        });
      }

      // ── COUNTERTOPS ────────────────────────────────────────────────────
      else if(id==='countertops'){
        preview+=shead('Kitchen');
        preview+=srow_req('Material', ST.answers['countertops_ct_kit']||ST.answers['ct_kit']||'');
        preview+=srow('Color direction', ST.answers['countertops_ct_color']||ST.answers['ct_color']||'');
        preview+=srow('Edge profile', ST.answers['countertops_ct_edge']||ST.answers['ct_edge']||'');
        preview+=srow('Island countertop', ST.answers['countertops_ct_isl']||ST.answers['ct_isl']||'');
        preview+=srow('Island material', ST.answers['countertops_ct_isl_mat']||ST.answers['ct_isl_mat']||'');
        preview+=srow_req('Kitchen product', ST.answers['countertops_ct_product']||ST.answers['ct_product']||'');
        bathRooms().forEach(function(b){
          preview+=shead(b.name+' Vanity');
          preview+=srow_req('Material', ST.answers['ct_bath_'+b.id]||'');
          preview+=srow_req('Product', ST.answers['ct_bath_product_'+b.id]||'');
        });
      }

      // ── PAINT ──────────────────────────────────────────────────────────
      else if(id==='paint'){
        preview+=shead('Whole-House Sheen');
        preview+=srow_req('All walls', ST.answers['paint_sheen_walls']||'');
        preview+=srow_req('All trim', ST.answers['paint_sheen_trim']||'');
        preview+=srow_req('All ceilings', ST.answers['paint_sheen_ceilings']||'');
        preview+=srow('Exceptions', ST.answers['paint_sheen_notes']||'');
        ST.rooms.forEach(function(r){
          var wall=ST.answers['paint_int_wall_'+r.id]||'';
          var trim=ST.answers['paint_int_trim_'+r.id]||'';
          var ceil=ST.answers['paint_int_ceil_'+r.id]||'';
          if(wall||trim||ceil){
            preview+=shead(r.name);
            preview+=srow_req('Walls',wall);
            preview+=srow_req('Trim',trim);
            preview+=srow_req('Ceiling',ceil);
          }
        });
        preview+=shead('Exterior');
        var pct=ST.answers['paint_porch_ceil_type']||'';
        var pcc=ST.answers['paint_porch_ceil_color']||'';
        if(pct||pcc)preview+=srow_req('Porch ceiling',pct+(pcc?' — '+pcc:''));
        var ppt=ST.answers['paint_porch_post_type']||'';
        var ppc=ST.answers['paint_porch_post_color']||'';
        if(ppt||ppc)preview+=srow_req('Porch posts',ppt+(ppc?' — '+ppc:''));
        var surfaces=[];try{surfaces=JSON.parse(ST.answers['paint_ext_surfaces']||'[]');}catch(e){}
        surfaces.forEach(function(s){
          if(s.name)preview+=srow_req(s.name,(s.type||'')+(s.color?' — '+s.color:''));
        });
      }

      // ── DOORS & TRIM ───────────────────────────────────────────────────
      else if(id==='doors'){
        [
          ['dr_sty','Door style'],['dr_ht','Door height'],['dr_col','Door finish'],
          ['tr_prof','Trim / casing profile'],['tr_base','Base molding'],['tr_crown','Crown molding'],
          ['tr_product','Millwork product']
        ].forEach(function(pair){
          var v=ST.answers['doors_'+pair[0]]||ST.answers[pair[0]]||'';
          preview+=srow_req(pair[1],v);
        });
        preview+=srow('Special doors', ST.answers['doors_dr_spec']||ST.answers['dr_spec']||'');
      }

      // ── GENERIC FALLBACK ───────────────────────────────────────────────
      else if(cat.fields){
        cat.fields.forEach(function(f){
          var v=ST.answers[id+'_'+f.id]||ST.answers[f.id]||'';
          if(v&&f.type!=='textarea')preview+=srow(f.label,v);
        });
      }

      return '<div class="sc"><div class="sc-hd"><span class="sc-nm" onclick="switchCat(\''+id+'\')">'+cat.name+'</span>'+badge+'</div>'+preview+'</div>';
    }).join('');
    return '<div class="ss"><h3>'+w.label+' — '+w.name+'</h3>'+rows+'</div>';
  }).join('');

  return '<div class="sum-card"><div style="font-size:20px;font-weight:700;margin-bottom:1rem">Selections Summary — '+ST.clientName+'</div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg-secondary);border-radius:var(--radius);margin-bottom:1.5rem;font-size:13px;border:1px solid var(--border)"><span style="color:var(--text-secondary)">Overall progress</span><span style="font-weight:700">'+done()+' of '+total()+' complete ('+pct()+'%)</span></div>'
    +secs
    +'<button class="btn btn-p" onclick="ST.view=\'form\';render()" style="width:100%;margin-top:1rem">Continue Selecting</button>'
    +'</div>';
}


function switchCat(id){ST.catId=id;ST.wave=CATS[id].wave;ST.view="form";render()}
function switchWave(idx){ST.wave=idx;const fid=ALL_IDS.find(id=>CATS[id].wave===idx);if(fid)ST.catId=fid;ST.view="form";render()}

// ── Setup ─────────────────────────────────────────────────
function setPlumbing(rid,type){const r=ST.rooms.find(r=>r.id===rid);if(!r)return;r.plumbing=type;render();}
function addRoom(){const inp=document.getElementById("add-room-inp");const name=inp.value.trim();if(!name)return;ST.rooms.push({id:"custom_"+Date.now(),name,plumbing:"none"});inp.value="";render();}
function removeRoom(rid){ST.rooms=ST.rooms.filter(r=>r.id!==rid);render();}
function startWaves(){
  if(!ST.rooms.length){const el=document.getElementById("setup-err");if(el){el.textContent="Please add at least one room.";el.style.display="block";setTimeout(()=>el.style.display="none",4000);}return;}
  persist();ST.screen="app";ST.wave=0;ST.catId="fireplace";ST.view="form";render();
}

  const wvCats=ALL_IDS.filter(id=>CATS[id].wave===ST.wave);
  const mbActive=ST.view==="moodboard";
  const wTabs=WAVES.map((w,i)=>{const allDone=ALL_IDS.filter(id=>CATS[id].wave===i).every(id=>catDone(id));const cls=i===ST.wave?"active":allDone?"done":"";return`<button class="wtab ${cls}" onclick="switchWave(${i})">${w.label}: ${w.name}</button>`;}).join("");
  const cPills=wvCats.map(id=>{const d=catDone(id),a=id===ST.catId&&ST.view==="form";return`<button class="cpill ${a?"active":""} ${d?"done":""}" onclick="switchCat('${id}')">${CATS[id].name}</button>`;}).join("");

function renderLogin(){
  return`<div class="login-wrap"><div class="login-card"><span class="login-logo">Six Arrows Blueprint</span><h2>Wave Selections</h2>

async function loginGo(){
  const name=document.getElementById("ln").value.trim();const proj=document.getElementById("lp").value.trim();
  if(!name){document.getElementById("lerr").style.display="block";return}
  ST.clientName=name;ST.projectName=proj;ST.clientKey=name.toLowerCase().replace(/[^a-z0-9]/g,"_");
  ST.answers={};ST.saved={};ST.fpUnits=[];ST.specSel={};ST.rooms=[];ST.plumbingFixtures={};ST.lightingTypes={};ST.roomOpen={};
  try{
    const a=await storageGet(sk("ans"));if(a)ST.answers=JSON.parse(a);
    const s=await storageGet(sk("sav"));if(s)ST.saved=JSON.parse(s);
    const f=await storageGet(sk("fpu"));if(f)ST.fpUnits=JSON.parse(f);
    const sp=await storageGet(sk("spc"));if(sp)ST.specSel=JSON.parse(sp);
    const rm=await storageGet(sk("rms"));if(rm)ST.rooms=JSON.parse(rm);
    const px=await storageGet(sk("pfx"));if(px)ST.plumbingFixtures=JSON.parse(px);
    const lx=await storageGet(sk("ltx"));if(lx)ST.lightingTypes=JSON.parse(lx);
  }catch(e){}
  ST.screen=ST.rooms.length?"app":"setup";ST.wave=0;ST.catId="fireplace";ST.view="form";render();
}

function renderMoodBoard(){
  var MOOD_CATS=[
    {id:'flooring',label:'Flooring'},
    {id:'tile',label:'Tile'},
    {id:'plumbing',label:'Plumbing Fixtures'},
    {id:'lighting',label:'Lighting Fixtures'},
    {id:'countertops',label:'Countertops'},
    {id:'paint',label:'Paint & Colors'},
    {id:'exterior_finishes',label:'Exterior Finishes'}
  ];

  function mbSection(catLabel, imgs, inspoArr){
    var html='';
    if(imgs){html+='<div class="mb-section"><div class="mb-section-hd">'+catLabel+'</div><div class="mb-grid">'+imgs+'</div></div>';}
    var inspoImgs=inspoArr.filter(function(u){return u;}).map(function(u){
      var s=u.replace(/"/g,'%22');
      return '<div class="mb-card"><img class="mb-img" src="'+s+'" onerror="imgErr(this.parentNode)" data-href="'+s+'" onclick="window.open(this.dataset.href)"><div class="mb-label">Inspiration</div></div>';
    }).join('');
    if(inspoImgs)html+='<div class="mb-section"><div class="mb-section-hd">'+catLabel+' — Inspiration</div><div class="mb-grid">'+inspoImgs+'</div></div>';
    return html;
  }

  function mbImg(url, label, sub){
    if(!url)return '';
    var s=url.replace(/"/g,'%22');
    return '<div class="mb-card"><img class="mb-img" src="'+s+'" onerror="imgErr(this.parentNode)" data-href="'+s+'" onclick="window.open(this.dataset.href)"><div class="mb-label">'+label+'</div>'+(sub?'<div class="mb-sublabel">'+sub+'</div>':'')+'</div>';
  }

  var sections='';

  // Flooring
  var fImgs=ST.rooms.map(function(r){return mbImg(getPhoto('flooring_product_'+r.id),r.name,ST.answers['flooring_floor_'+r.id]||'');}).join('');
  sections+=mbSection('Flooring',fImgs,getInspo('flooring'));

  // Tile
  var tImgs=bathRooms().map(function(b){return mbImg(getPhoto('tile_inspo_'+b.id),b.name,'');}).join('');
  sections+=mbSection('Tile',tImgs,getInspo('tile'));

  // Plumbing
  var pImgs='';
  plumbingRooms().forEach(function(r){
    getFixturesForType(r.plumbing).forEach(function(f){
      if(!isFixtureSel(r.id,f.id))return;
      pImgs+=mbImg(getPhoto('plumbing_'+r.id+'_'+f.id),r.name+' — '+f.name,'');
    });
  });
  sections+=mbSection('Plumbing Fixtures',pImgs,getInspo('plumbing'));

  // Lighting
  var lImgs='';
  ST.rooms.forEach(function(r){
    var sel=ST.lightingTypes[r.id]||{};
    LIGHT_TYPES.forEach(function(lt){
      if(!sel[lt.id])return;
      lImgs+=mbImg(getPhoto('lighting_'+r.id+'_'+lt.id),r.name+' — '+lt.name,'');
    });
  });
  sections+=mbSection('Lighting Fixtures',lImgs,getInspo('lighting'));

  // Countertops / Paint / Exterior — inspo only
  sections+=mbSection('Countertops','',getInspo('countertops'));
  sections+=mbSection('Paint & Colors','',getInspo('paint'));
  sections+=mbSection('Exterior Finishes','',getInspo('exterior_finishes'));

  return '<div class="sum-card">'
    +'<div style="font-size:20px;font-weight:700;margin-bottom:4px">🎨 Mood Board — '+ST.clientName+'</div>'
    +'<div style="font-size:13px;color:var(--text-secondary);margin-bottom:1.5rem">Add photo URLs to your selections to build your board. Use the Inspiration Photos section in each category to add general direction images.</div>'
    +(sections.trim()
      ? sections
      : '<div style="padding:2rem;text-align:center;color:var(--text-secondary);background:var(--bg-secondary);border-radius:8px"><div style="font-size:32px;margin-bottom:10px">🎨</div><div style="font-weight:600;margin-bottom:6px">No photos yet</div><div style="font-size:13px">Go to Flooring, Lighting, or other categories and add photo URLs to your product selections or inspiration sections.</div></div>')
    +'</div>';
}

function render(){
  document.getElementById("app").innerHTML=ST.screen==="login"?renderLogin():ST.screen==="setup"?renderSetup():renderApp();
  if(ST.screen==="app"&&ST.catId==="fireplace"&&ST.view==="form")setTimeout(renderFpUnits,0);
}

// ── Portal integration: auto-login from URL params ──
async function portalInit(){
  const params=new URLSearchParams(window.location.search);
  const pClientKey=params.get("clientKey");
  const pClientName=params.get("clientName");
  const pProjectName=params.get("projectName")||"";
  const pWave=parseInt(params.get("wave")||"0");
  const pCat=params.get("cat")||"fireplace";

  if(pClientKey && pClientName){
    // Auto-login — skip login screen entirely
    const adminMode = params.get("adminMode")==="1";
    ST.clientName=pClientName;
    ST.projectName=pProjectName;
    ST.clientKey=pClientKey;
    ST.adminMode=adminMode;
    ST.answers={};ST.saved={};ST.fpUnits=[];ST.specSel={};
    ST.rooms=[];ST.plumbingFixtures={};ST.lightingTypes={};ST.roomOpen={};
    try{
      // Load all selections in a single request (much faster than 7 individual calls)
      const res = await fetch(`/.netlify/functions/selections-storage?clientKey=${pClientKey}`);
      if(res.ok){
        const result = await res.json();
        const d = result.data || {};
        // Populate cache and state from bulk response
        const parse = (v,fb) => { try{ return v ? (typeof v === 'string' ? JSON.parse(v) : v) : fb; }catch(e){return fb;} };
        if(d.ans !== undefined){ _localCache[sk("ans")]=JSON.stringify(d.ans); ST.answers=parse(d.ans,{}); }
        if(d.sav !== undefined){ _localCache[sk("sav")]=JSON.stringify(d.sav); ST.saved=parse(d.sav,{}); }
        if(d.fpu !== undefined){ _localCache[sk("fpu")]=JSON.stringify(d.fpu); ST.fpUnits=parse(d.fpu,[]); }
        if(d.spc !== undefined){ _localCache[sk("spc")]=JSON.stringify(d.spc); ST.specSel=parse(d.spc,{}); }
        if(d.rms !== undefined){ _localCache[sk("rms")]=JSON.stringify(d.rms); ST.rooms=parse(d.rms,[]); }
        if(d.pfx !== undefined){ _localCache[sk("pfx")]=JSON.stringify(d.pfx); ST.plumbingFixtures=parse(d.pfx,{}); }
        if(d.ltx !== undefined){ _localCache[sk("ltx")]=JSON.stringify(d.ltx); ST.lightingTypes=parse(d.ltx,{}); }
      } else {
        // Fall back to localStorage if server unavailable
        const tryLS = (k,fb) => { try{ return JSON.parse(localStorage.getItem(k)||'null')||fb; }catch(e){return fb;} };
        ST.answers=tryLS(`sab8_${pClientKey}_ans`,{});
        ST.saved=tryLS(`sab8_${pClientKey}_sav`,{});
        ST.fpUnits=tryLS(`sab8_${pClientKey}_fpu`,[]);
        ST.specSel=tryLS(`sab8_${pClientKey}_spc`,{});
        ST.rooms=tryLS(`sab8_${pClientKey}_rms`,[]);
        ST.plumbingFixtures=tryLS(`sab8_${pClientKey}_pfx`,{});
        ST.lightingTypes=tryLS(`sab8_${pClientKey}_ltx`,{});
      }
    }catch(e){
      console.error('Failed to load selections:', e);
    }
    ST.screen=ST.rooms.length?"app":"setup";
    ST.wave=pWave;
    // Find first cat of target wave
    const waveCats=ALL_IDS.filter(id=>CATS[id].wave===pWave);
    ST.catId=waveCats[0]||"fireplace";
    ST.view="form";
    // Show admin banner if in admin mode
    if(adminMode){
      const banner=document.createElement('div');
      banner.style.cssText='position:fixed;top:0;left:0;right:0;z-index:999;background:#2d3a26;color:#e8dfc8;font-size:12px;font-weight:600;text-align:center;padding:8px;letter-spacing:.04em';
      banner.textContent=`ADMIN MODE — Editing selections on behalf of ${pClientName}. All changes save directly to their account.`;
      document.body.prepend(banner);
      document.body.style.paddingTop='36px';
    }
    render();
  } else {
    render();
  }
}
portalInit();</script>
</body>
