<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Selections — Six Arrows</title>
<link rel="stylesheet" href="style.css"/>
<script src="data.js"></script>
<script src="app.js"></script>
<style>
/* ── Selections overview cards ── */
.sel-wave-card {
  background: var(--white);
  border: 0.5px solid var(--border);
  border-radius: var(--r-lg);
  padding: 1.25rem 1.375rem;
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 10px;
  transition: border-color 0.18s, box-shadow 0.18s;
}
.sel-wave-card.clickable { cursor: pointer; }
.sel-wave-card.clickable:hover { border-color: var(--border-2); box-shadow: var(--sh-md); }
.sel-wave-card.complete { border-color: rgba(117,127,105,.28); background: var(--green-pale); }

.swc-num {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; flex-shrink: 0;
}
.swc-num.done { background: var(--green); color: white; }
.swc-num.active { background: var(--green-lt); color: var(--green-deep); border: 2px solid var(--green); }
.swc-num.locked { background: var(--cream-2); color: var(--charcoal-4); }
.swc-num svg { width: 16px; height: 16px; fill: currentColor; }

.swc-body { flex: 1; min-width: 0; }
.swc-wave { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--charcoal-4); margin-bottom: 2px; }
.sel-wave-card.complete .swc-wave { color: var(--green-dk); }
.swc-name { font-size: 15px; font-weight: 700; color: var(--charcoal); margin-bottom: 3px; }
.swc-cats { font-size: 12px; color: var(--charcoal-3); line-height: 1.4; }

.swc-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.swc-pct { font-size: 20px; font-weight: 700; color: var(--charcoal); }
.sel-wave-card.complete .swc-pct { color: var(--green-dk); }
.swc-open-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--charcoal); color: var(--cream);
  border: none; border-radius: var(--r-full);
  padding: 7px 16px; font-family: 'Work Sans', sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: opacity 0.15s; white-space: nowrap;
}
.swc-open-btn:hover { opacity: 0.82; }
.swc-open-btn svg { width: 11px; height: 11px; fill: currentColor; }

/* ── Category breakdown ── */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0,1fr));
  gap: 6px;
  margin-top: 10px;
  width: 100%;
}
@media (max-width: 700px) {
  .cat-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .sel-wave-card {
    flex-wrap: wrap;
  }
  .swc-num { align-self: flex-start; }
  .swc-body { min-width: 0; width: 100%; }
  .swc-right {
    flex-direction: row; align-items: center;
    width: 100%; justify-content: space-between;
    padding-top: 10px;
    border-top: 0.5px solid var(--border);
    margin-top: 4px;
  }
  .swc-pct { font-size: 18px; }
}
@media (max-width: 400px) {
  .cat-grid { grid-template-columns: 1fr; }
}
.cat-cell {
  background: var(--cream-pale);
  border: 0.5px solid var(--border);
  border-radius: var(--r-md);
  padding: 8px 10px;
  display: flex; align-items: center; gap: 7px;
  min-width: 0;
  overflow: hidden;
}
.cat-cell.done { background: var(--green-lt); border-color: rgba(117,127,105,.25); }
.cat-cell-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--cream-3); }
.cat-cell.done .cat-cell-dot { background: var(--green); }
.cat-cell-name {
  font-size: 11px; color: var(--charcoal-3); flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.cat-cell.done .cat-cell-name { color: var(--green-deep); font-weight: 500; }
.cat-cell-check { font-size: 11px; color: var(--green-dk); font-weight: 700; flex-shrink: 0; }

/* ── Open full app banner ── */
.open-full-banner {
  display: flex; align-items: center; gap: 14px;
  background: var(--charcoal); border-radius: var(--r-xl);
  padding: 1.375rem 1.75rem; margin-bottom: 1.25rem;
  position: relative; overflow: hidden;
}
.open-full-banner::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(117,127,105,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(117,127,105,.05) 1px,transparent 1px);
  background-size: 24px 24px; pointer-events: none;
}
.ofb-inner { position: relative; z-index: 1; display: flex; align-items: center; gap: 14px; flex: 1; flex-wrap: wrap; }
.ofb-body { flex: 1; min-width: 180px; }
.ofb-eyebrow { font-size: 9px; text-transform: uppercase; letter-spacing: .15em; color: var(--green); font-weight: 700; margin-bottom: 3px; }
.ofb-title { font-size: 17px; font-weight: 700; color: var(--cream); margin-bottom: 4px; letter-spacing: -.01em; }
.ofb-sub { font-size: 13px; color: rgba(235,233,222,.5); }
.ofb-btn {
  background: var(--green); color: white;
  border: none; border-radius: var(--r-full);
  padding: 11px 22px; font-family: 'Work Sans', sans-serif;
  font-size: 14px; font-weight: 600; cursor: pointer;
  white-space: nowrap; flex-shrink: 0;
  transition: opacity 0.15s; position: relative; z-index: 1;
}
.ofb-btn:hover { opacity: 0.88; }
</style>
</head>
<body>
<script>
const p = AUTH.requireAuth();
if (p) {
  // ── Read live selections data from the same localStorage the app uses ──
  const ck = p.selectionsClientKey || p.id;
  function selGet(suffix) {
    try { return JSON.parse(localStorage.getItem(`sab8_${ck}_${suffix}`) || 'null'); } catch(e) { return null; }
  }
  const saved   = selGet('sav') || {};
  const answers = selGet('ans') || {};

  // ALL_IDS from the app: order matters for wave assignment
  const ALL_IDS_W = {
    fireplace:0, appliances:0, exterior_finishes:0,
    specialty_trim:1, flooring:1, tile:1,
    plumbing:2, lighting:2, countertops:2, hardware:2, paint:2, doors:2
  };
  const CAT_NAMES = {
    fireplace:'Fireplace', appliances:'Appliances', exterior_finishes:'Exterior Finishes',
    specialty_trim:'Specialty Trim', flooring:'Flooring', tile:'Tile',
    plumbing:'Plumbing Fixtures', lighting:'Lighting Fixtures', countertops:'Countertops',
    hardware:'Hardware', paint:'Paint & Stain', doors:'Interior Doors & Trim'
  };
  function isSaved(id) { return !!saved[id]; }
  function isSkipped(id) { return id === 'fireplace' && answers['fireplace_fp_want'] === 'No — no fireplace'; }
  function catDone(id) { return isSaved(id) || isSkipped(id); }

  const WAVES = [
    { wave:0, label:'Wave 1', name:'Structure', cats:['fireplace','appliances','exterior_finishes'] },
    { wave:1, label:'Wave 2', name:'The Shell',  cats:['specialty_trim','flooring','tile'] },
    { wave:2, label:'Wave 3', name:'The Jewelry', cats:['plumbing','lighting','countertops','hardware','paint','doors'] },
  ];

  const totalCats = Object.keys(ALL_IDS_W).length;
  const doneCats  = Object.keys(ALL_IDS_W).filter(id => catDone(id)).length;
  const overallPct = Math.round(doneCats / totalCats * 100);

  function openWave(waveNum) {
    const params = new URLSearchParams({
      clientKey:   ck,
      clientName:  p.clientName,
      projectName: p.projectName,
      wave: waveNum
    });
    window.location.href = `selections-app.html?${params.toString()}`;
  }

  function openFull() { openWave(0); }

  mountLayout('selections', 'Selections', `
    <div class="page-eyebrow">Finishes & Specifications</div>
    <div class="page-title">Wave Selections</div>
    <p class="page-sub">Every finish, fixture, and surface — organized by wave. Work through each wave in order, then mark it complete.</p>

    <!-- Open full app banner -->
    <div class="open-full-banner">
      <div class="ofb-inner">
        <div class="ofb-body">
          <div class="ofb-eyebrow">Six Arrows Wave Selections™</div>
          <div class="ofb-title">${doneCats} of ${totalCats} categories complete</div>
          <div class="ofb-sub">${overallPct}% of all selections finalized across all three waves</div>
        </div>
        <button class="ofb-btn" onclick="openFull()">Open Selections App →</button>
      </div>
    </div>

    <!-- Wave cards -->
    ${WAVES.map(w => {
      const waveDone  = w.cats.filter(id => catDone(id)).length;
      const waveTotal = w.cats.length;
      const wavePct   = Math.round(waveDone / waveTotal * 100);
      const complete  = waveDone === waveTotal;
      const numContent = complete
        ? `<svg viewBox="0 0 16 16"><path d="M3 8l4 4 6-6" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>`
        : (w.wave + 1);
      const numCls = complete ? 'done' : waveDone > 0 ? 'active' : 'locked';
      return `
      <div class="sel-wave-card ${complete?'complete':''} clickable" onclick="openWave(${w.wave})">
        <div class="swc-num ${numCls}">${numContent}</div>
        <div class="swc-body">
          <div class="swc-wave">${w.label}</div>
          <div class="swc-name">${w.name}</div>
          <div class="swc-cats">${w.cats.map(id => CAT_NAMES[id]).join(' · ')}</div>
          <div class="cat-grid" style="margin-top:10px">
            ${w.cats.map(id => `
              <div class="cat-cell ${catDone(id)?'done':''}">
                <div class="cat-cell-dot"></div>
                <div class="cat-cell-name">${CAT_NAMES[id]}</div>
                ${catDone(id)?'<div class="cat-cell-check">✓</div>':''}
              </div>`).join('')}
          </div>
        </div>
        <div class="swc-right">
          <div class="swc-pct">${wavePct}%</div>
          <button class="swc-open-btn" onclick="event.stopPropagation();openWave(${w.wave})">
            ${complete ? 'Review' : 'Continue'}
            <svg viewBox="0 0 12 12"><path d="M3 9.5L9.5 3M5 3h4.5v4.5" stroke="white" stroke-width="1.3" fill="none" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>`;
    }).join('')}
  `);
}
</script>
</body>
</html>
